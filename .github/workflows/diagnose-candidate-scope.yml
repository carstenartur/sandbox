name: Diagnose candidate scope reactor

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'sandbox_common/**'
      - 'sandbox_common_test/**'
      - 'sandbox_test_commons/**'
      - 'sandbox_int_to_enum/**'
      - 'sandbox_int_to_enum_test/**'
      - 'sandbox_junit_cleanup/**'
      - 'sandbox_junit_cleanup_test/**'
      - '.github/workflows/diagnose-candidate-scope.yml'

permissions:
  contents: read

jobs:
  compile:
    runs-on: ubuntu-latest
    env:
      DISPLAY: :0
      MAVEN_OPTS: -Djava.awt.headless=true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1
        with:
          maven-version: 3.9.14
      - name: Install target definition
        run: >-
          mvn --batch-mode -ntp
          -pl sandbox_target -am
          -DskipTests -Dspotbugs.skip=true -Djacoco.skip=true
          install
      - name: Compile affected reactor
        shell: bash
        run: |
          set +e
          mvn --batch-mode -ntp \
            -pl sandbox_common,sandbox_common_test,sandbox_test_commons,sandbox_int_to_enum,sandbox_int_to_enum_test,sandbox_junit_cleanup,sandbox_junit_cleanup_test -am \
            -DskipTests -Dspotbugs.skip=true -Djacoco.skip=true \
            clean package > candidate-scope-reactor.log 2>&1
          status=$?
          tail -n 250 candidate-scope-reactor.log
          exit "$status"
      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: candidate-scope-reactor-log
          path: candidate-scope-reactor.log
          retention-days: 2
          if-no-files-found: error
