name: One-shot Branch Maintenance

on:
  push:
    branches:
      - test/1213-save-action-isolation

permissions:
  contents: write

jobs:
  save-action-diagnostics:
    if: github.ref_name == 'test/1213-save-action-isolation' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
      - uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1
        with:
          maven-version: 3.9.14
      - name: Build reactor and capture complete output
        id: build
        shell: bash
        run: |
          set +e
          mvn -e -V -T 1C --batch-mode -Dtycho.localArtifacts=ignore -DskipTests clean verify > save-action-build.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 400 save-action-build.log
          exit 0
      - uses: actions/upload-artifact@v7
        with:
          name: save-action-build-log
          path: save-action-build.log
          retention-days: 3
      - name: Remove one-shot workflow from branch
        run: |
          set -euo pipefail
          git rm .github/workflows/one-shot-branch-maintenance.yml
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git commit -m 'ci: remove one-shot save-action diagnostics'
          git push origin HEAD:test/1213-save-action-isolation
      - name: Fail when diagnostic build failed
        if: steps.build.outputs.status != '0'
        run: exit 1
