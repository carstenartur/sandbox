name: Diagnose SpotBugs upgrade

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1
        with:
          maven-version: 3.9.14
      - name: Run analyzer and print concise failure context
        shell: bash
        run: |
          set +e
          mvn --batch-mode -ntp -T 1C \
            -DskipTests -Djacoco.skip=true -Dtycho.localArtifacts=ignore \
            clean verify > spotbugs-upgrade.log 2>&1
          status=$?
          echo '=== SpotBugs and Maven diagnostics ==='
          grep -E 'BugInstance|SpotBugs|spotbugs|High:|Medium:|Low:|Total bugs|\[ERROR\]|BUILD FAILURE|Failed to execute' \
            spotbugs-upgrade.log | tail -n 180 || true
          echo '=== final Maven output ==='
          tail -n 100 spotbugs-upgrade.log
          exit "$status"
