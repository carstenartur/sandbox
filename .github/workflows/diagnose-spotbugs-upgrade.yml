name: Diagnose SpotBugs upgrade

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'pom.xml'
      - 'sandbox_mining_core/**'
      - 'sandbox_extra_search/**'
      - '.github/workflows/diagnose-spotbugs-upgrade.yml'

concurrency:
  group: diagnose-spotbugs-upgrade-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1
        with:
          maven-version: 3.9.14
      - name: Run analyzer and capture concise failure context
        id: analyze
        shell: bash
        run: |
          set +e
          mvn --batch-mode -ntp -T 1C \
            -DskipTests -Djacoco.skip=true -Dtycho.localArtifacts=ignore \
            clean verify > spotbugs-upgrade.log 2>&1
          status=$?
          {
            echo '## Filtered analyzer diagnostics'
            grep -E 'BugInstance|SpotBugs|spotbugs|High:|Medium:|Low:|Total bugs|\[ERROR\]|BUILD FAILURE|Failed to execute' \
              spotbugs-upgrade.log | tail -n 180 || true
            echo
            echo '## Reactor tail'
            tail -n 300 spotbugs-upgrade.log
          } > diagnostics.txt
          cat diagnostics.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload concise diagnostics
        uses: actions/upload-artifact@v7
        with:
          name: spotbugs-upgrade-diagnostics
          path: diagnostics.txt
          retention-days: 1
          if-no-files-found: error
      - name: Fail when the analyzer failed
        if: steps.analyze.outputs.status != '0'
        run: exit 1
