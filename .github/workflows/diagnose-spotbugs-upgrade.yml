name: Diagnose SpotBugs upgrade

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1
        with:
          maven-version: 3.9.14
      - name: Run analyzer and publish concise failure context
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          mvn --batch-mode -ntp -T 1C \
            -DskipTests -Djacoco.skip=true -Dtycho.localArtifacts=ignore \
            clean verify > spotbugs-upgrade.log 2>&1
          status=$?
          {
            echo '<!-- spotbugs-upgrade-diagnostics -->'
            echo '## SpotBugs upgrade diagnostics'
            echo
            echo '```text'
            grep -E 'BugInstance|SpotBugs|spotbugs|High:|Medium:|Low:|Total bugs|\[ERROR\]|BUILD FAILURE|Failed to execute' \
              spotbugs-upgrade.log | tail -n 80 || true
            echo '```'
          } > diagnostics.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file diagnostics.md
          exit "$status"
