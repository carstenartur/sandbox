name: Apply candidate scope closure patch

on:
  push:
    branches: [ issue-1212-candidate-scope ]
    paths:
      - '.github/workflows/apply-candidate-scope-patch.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: issue-1212-candidate-scope
          fetch-depth: 0
      - name: Apply verified textual patches
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected exactly one match in {path}, found {count}")
              file.write_text(text.replace(old, new), encoding="utf-8")

          replace_once(
              "sandbox_int_to_enum/src/org/sandbox/jdt/internal/corext/fix/multifile/IntEnumMultiFilePlanner.java",
              '''\t/** Creates a plan for complete-project source selections. */
          \tpublic static MultiFileCleanUpPlanResult<IntEnumMigrationPlan> create(IJavaProject project,
          \t\t\tICompilationUnit[] selectedUnits, IProgressMonitor monitor) throws CoreException {
          \t\tSelectedCompilationUnitPlan scope= SelectedCompilationUnitPlan.of(project, selectedUnits);
          \t\tif (monitor != null && monitor.isCanceled()) {
          \t\t\tthrow new OperationCanceledException();
          \t\t}
          \t\tSet<String> allHandles= new LinkedHashSet<>();
          \t\tfor (ICompilationUnit unit : JavaProjectCompilationUnits.collect(project)) {
          \t\t\tallHandles.add(unit.getHandleIdentifier());
          \t\t}
          \t\tif (!scope.compilationUnitHandles().equals(allHandles)) {
          \t\t\treturn MultiFileCleanUpPlanResult.success(new IntEnumMigrationPlan(scope, List.of()));
          \t\t}

          \t\tMap<String, CompilationUnit> roots= parse(project, selectedUnits, monitor);
          \t\tList<CandidateBuilder> builders= discoverCandidates(roots);
          \t\tvalidateReferences(roots, builders);
          \t\tList<IntEnumCandidate> candidates= freeze(builders);
          \t\treturn MultiFileCleanUpPlanResult.success(new IntEnumMigrationPlan(scope, candidates));
          \t}
          ''',
              '''\t/** Creates a plan for an explicitly complete project selection. */
          \tpublic static MultiFileCleanUpPlanResult<IntEnumMigrationPlan> create(IJavaProject project,
          \t\t\tICompilationUnit[] selectedUnits, IProgressMonitor monitor) throws CoreException {
          \t\tif (monitor != null && monitor.isCanceled()) {
          \t\t\tthrow new OperationCanceledException();
          \t\t}
          \t\tSelectedCompilationUnitPlan scope= SelectedCompilationUnitPlan.of(project, selectedUnits);
          \t\tSet<String> allHandles= new LinkedHashSet<>();
          \t\tfor (ICompilationUnit unit : JavaProjectCompilationUnits.collect(project)) {
          \t\t\tallHandles.add(unit.getHandleIdentifier());
          \t\t}
          \t\treturn create(project, selectedUnits, scope.compilationUnitHandles().equals(allHandles), monitor);
          \t}

          \t/**
          \t * Creates a plan after the caller has proved that the selected source units
          \t * form a closed migration scope.
          \t */
          \tpublic static MultiFileCleanUpPlanResult<IntEnumMigrationPlan> create(IJavaProject project,
          \t\t\tICompilationUnit[] selectedUnits, boolean closedScope, IProgressMonitor monitor) throws CoreException {
          \t\tSelectedCompilationUnitPlan scope= SelectedCompilationUnitPlan.of(project, selectedUnits);
          \t\tif (monitor != null && monitor.isCanceled()) {
          \t\t\tthrow new OperationCanceledException();
          \t\t}
          \t\tif (!closedScope) {
          \t\t\treturn MultiFileCleanUpPlanResult.success(new IntEnumMigrationPlan(scope, List.of()));
          \t\t}

          \t\tMap<String, CompilationUnit> roots= parse(project, selectedUnits, monitor);
          \t\tList<CandidateBuilder> builders= discoverCandidates(roots);
          \t\tvalidateReferences(roots, builders);
          \t\tList<IntEnumCandidate> candidates= freeze(builders);
          \t\treturn MultiFileCleanUpPlanResult.success(new IntEnumMigrationPlan(scope, candidates));
          \t}
          ''')

          replace_once(
              "sandbox_junit_cleanup/src/org/sandbox/jdt/internal/corext/fix/multifile/JUnitMultiFilePlanner.java",
              '''\t/**
          \t * Plans named ExternalResource migrations when the cleanup scope contains every
          \t * Java source compilation unit in the project.
          \t */
          \tpublic static MultiFileCleanUpPlanResult<JUnitMigrationPlan> create(IJavaProject project,
          \t\t\tICompilationUnit[] selectedUnits, boolean migrateExternalResourceRules, IProgressMonitor monitor)
          \t\t\tthrows CoreException {
          \t\tSelectedCompilationUnitPlan selectedScope= SelectedCompilationUnitPlan.of(project, selectedUnits);
          \t\tif (!migrateExternalResourceRules || selectedUnits.length == 0) {
          \t\t\treturn MultiFileCleanUpPlanResult.success(new JUnitMigrationPlan(selectedScope, List.of()));
          \t\t}
          \t\tif (monitor != null && monitor.isCanceled()) {
          \t\t\tthrow new OperationCanceledException();
          \t\t}

          \t\tList<ICompilationUnit> allProjectUnits= JavaProjectCompilationUnits.collect(project);
          \t\tSet<String> selectedHandles= selectedScope.compilationUnitHandles();
          \t\tSet<String> projectHandles= new LinkedHashSet<>();
          \t\tfor (ICompilationUnit unit : allProjectUnits) {
          \t\t\tprojectHandles.add(unit.getPrimary().getHandleIdentifier());
          \t\t}
          \t\tif (!selectedHandles.equals(projectHandles)) {
          \t\t\treturn MultiFileCleanUpPlanResult.success(new JUnitMigrationPlan(selectedScope, List.of()));
          \t\t}

          \t\tMap<String, CompilationUnit> rootsByHandle= parse(project, selectedUnits, monitor);
          \t\tMap<String, ResourceType> resourcesByTypeKey= collectResourceTypes(rootsByHandle);
          \t\tList<RuleField> ruleFields= collectRuleFields(rootsByHandle, resourcesByTypeKey);
          \t\tRefactoringStatus status= new RefactoringStatus();
          \t\tList<ExternalResourceRuleMigration> migrations= createMigrations(ruleFields, resourcesByTypeKey, status);
          \t\tif (status.hasFatalError()) {
          \t\t\treturn new MultiFileCleanUpPlanResult<>(null, status);
          \t\t}
          \t\treturn new MultiFileCleanUpPlanResult<>(new JUnitMigrationPlan(selectedScope, migrations), status);
          \t}
          ''',
              '''\t/** Plans named ExternalResource migrations for a complete project selection. */
          \tpublic static MultiFileCleanUpPlanResult<JUnitMigrationPlan> create(IJavaProject project,
          \t\t\tICompilationUnit[] selectedUnits, boolean migrateExternalResourceRules, IProgressMonitor monitor)
          \t\t\tthrows CoreException {
          \t\tSelectedCompilationUnitPlan selectedScope= SelectedCompilationUnitPlan.of(project, selectedUnits);
          \t\tif (!migrateExternalResourceRules || selectedUnits.length == 0) {
          \t\t\treturn MultiFileCleanUpPlanResult.success(new JUnitMigrationPlan(selectedScope, List.of()));
          \t\t}
          \t\tif (monitor != null && monitor.isCanceled()) {
          \t\t\tthrow new OperationCanceledException();
          \t\t}
          \t\tList<ICompilationUnit> allProjectUnits= JavaProjectCompilationUnits.collect(project);
          \t\tSet<String> projectHandles= new LinkedHashSet<>();
          \t\tfor (ICompilationUnit unit : allProjectUnits) {
          \t\t\tprojectHandles.add(unit.getPrimary().getHandleIdentifier());
          \t\t}
          \t\treturn create(project, selectedUnits, migrateExternalResourceRules,
          \t\t\t\tselectedScope.compilationUnitHandles().equals(projectHandles), monitor);
          \t}

          \t/**
          \t * Plans named ExternalResource migrations after the caller has proved that the
          \t * selected source units form a closed migration scope.
          \t */
          \tpublic static MultiFileCleanUpPlanResult<JUnitMigrationPlan> create(IJavaProject project,
          \t\t\tICompilationUnit[] selectedUnits, boolean migrateExternalResourceRules, boolean closedScope,
          \t\t\tIProgressMonitor monitor) throws CoreException {
          \t\tSelectedCompilationUnitPlan selectedScope= SelectedCompilationUnitPlan.of(project, selectedUnits);
          \t\tif (!migrateExternalResourceRules || selectedUnits.length == 0 || !closedScope) {
          \t\t\treturn MultiFileCleanUpPlanResult.success(new JUnitMigrationPlan(selectedScope, List.of()));
          \t\t}
          \t\tif (monitor != null && monitor.isCanceled()) {
          \t\t\tthrow new OperationCanceledException();
          \t\t}

          \t\tMap<String, CompilationUnit> rootsByHandle= parse(project, selectedUnits, monitor);
          \t\tMap<String, ResourceType> resourcesByTypeKey= collectResourceTypes(rootsByHandle);
          \t\tList<RuleField> ruleFields= collectRuleFields(rootsByHandle, resourcesByTypeKey);
          \t\tRefactoringStatus status= new RefactoringStatus();
          \t\tList<ExternalResourceRuleMigration> migrations= createMigrations(ruleFields, resourcesByTypeKey, status);
          \t\tif (status.hasFatalError()) {
          \t\t\treturn new MultiFileCleanUpPlanResult<>(null, status);
          \t\t}
          \t\treturn new MultiFileCleanUpPlanResult<>(new JUnitMigrationPlan(selectedScope, migrations), status);
          \t}
          ''')

          int_core = "sandbox_int_to_enum/src/org/sandbox/jdt/internal/ui/fix/IntToEnumCleanUpCore.java"
          replace_once(int_core,
              '''import org.sandbox.jdt.cleanup.multifile.MultiFileCleanUpPlanResult;
          import org.sandbox.jdt.cleanup.multifile.SelectedCompilationUnitPlan;
          import org.sandbox.jdt.cleanup.multifile.SourceRootPolicy;
          ''',
              '''import org.sandbox.jdt.cleanup.multifile.MultiFileCleanUpPlanResult;
          import org.sandbox.jdt.cleanup.multifile.RelatedCompilationUnitSearch;
          import org.sandbox.jdt.cleanup.multifile.SelectedCompilationUnitPlan;
          import org.sandbox.jdt.cleanup.multifile.SourceRootPolicy;
          ''')
          replace_once(int_core,
              '''\tprivate final Map<IJavaProject, Set<String>> pendingExpandedScopes= new HashMap<>();
          ''',
              '''\tprivate final Map<IJavaProject, Set<String>> pendingExpandedScopes= new HashMap<>();
          \tprivate final Map<IJavaProject, Set<String>> verifiedClosedScopes= new HashMap<>();
          \tprivate final Set<IJavaProject> rejectedScopes= new HashSet<>();
          ''')
          replace_once(int_core,
              '''\t\treturn IntEnumMultiFilePlanner.create(project, compilationUnits, monitor);
          ''',
              '''\t\tBoolean closedScope= consumeClosedScopeDecision(project, compilationUnits);
          \t\treturn closedScope == null
          \t\t\t\t? IntEnumMultiFilePlanner.create(project, compilationUnits, monitor)
          \t\t\t\t: IntEnumMultiFilePlanner.create(project, compilationUnits, closedScope.booleanValue(), monitor);
          ''')
          replace_once(int_core,
              '''\t\tSet<String> currentHandles= handles(currentScope);
          \t\tSet<String> pendingScope= pendingExpandedScopes.remove(project);
          \t\tif (pendingScope != null && currentHandles.containsAll(pendingScope)) {
          \t\t\treturn List.of();
          \t\t}
          \t\tif (!IntEnumScopeCandidateDetector.containsCandidate(project, currentScope, monitor)) {
          \t\t\treturn List.of();
          \t\t}

          \t\tList<ICompilationUnit> projectUnits= JavaProjectCompilationUnits.collect(project, currentScope,
          \t\t\t\tSourceRootPolicy.PRODUCTION_WITH_DEPENDENT_TESTS);
          \t\tSet<String> projectHandles= handles(projectUnits);
          \t\tif (!currentHandles.containsAll(projectHandles)) {
          \t\t\tpendingExpandedScopes.put(project, projectHandles);
          \t\t}
          \t\treturn projectUnits;
          ''',
              '''\t\tSet<String> currentHandles= handles(currentScope);
          \t\tSet<String> pendingScope= pendingExpandedScopes.get(project);
          \t\tif (pendingScope != null && currentHandles.containsAll(pendingScope)) {
          \t\t\tpendingExpandedScopes.remove(project);
          \t\t\tverifiedClosedScopes.put(project, pendingScope);
          \t\t\treturn List.of();
          \t\t}
          \t\trejectedScopes.remove(project);
          \t\tIntEnumScopeCandidateDetector.SearchSeeds seeds=
          \t\t\t\tIntEnumScopeCandidateDetector.findSearchSeeds(project, currentScope, monitor);
          \t\tif (!seeds.candidateFound()) {
          \t\t\tclearScopeDecision(project);
          \t\t\treturn List.of();
          \t\t}

          \t\tList<ICompilationUnit> allowedUnits= JavaProjectCompilationUnits.collect(project, currentScope,
          \t\t\t\tSourceRootPolicy.PRODUCTION_WITH_DEPENDENT_TESTS);
          \t\tList<ICompilationUnit> requiredUnits;
          \t\tif (!seeds.complete()) {
          \t\t\trequiredUnits= allowedUnits;
          \t\t} else {
          \t\t\tRelatedCompilationUnitSearch.Result related= RelatedCompilationUnitSearch.findReferences(project,
          \t\t\t\t\tseeds.elements(), currentScope, allowedUnits, monitor);
          \t\t\tif (!related.complete()) {
          \t\t\t\tclearScopeDecision(project);
          \t\t\t\trejectedScopes.add(project);
          \t\t\t\treturn List.of();
          \t\t\t}
          \t\t\trequiredUnits= related.compilationUnits();
          \t\t}
          \t\treturn registerRequiredScope(project, currentHandles, requiredUnits);
          ''')
          replace_once(int_core,
              '''\tprivate static Set<String> handles(Collection<ICompilationUnit> units) {
          ''',
              '''\tprivate Collection<ICompilationUnit> registerRequiredScope(IJavaProject project,
          \t\t\tSet<String> currentHandles, Collection<ICompilationUnit> requiredUnits) {
          \t\tSet<String> requiredHandles= handles(requiredUnits);
          \t\tif (currentHandles.containsAll(requiredHandles)) {
          \t\t\tverifiedClosedScopes.put(project, requiredHandles);
          \t\t\tpendingExpandedScopes.remove(project);
          \t\t\treturn List.of();
          \t\t}
          \t\tpendingExpandedScopes.put(project, requiredHandles);
          \t\tverifiedClosedScopes.remove(project);
          \t\treturn requiredUnits;
          \t}

          \tprivate Boolean consumeClosedScopeDecision(IJavaProject project, ICompilationUnit[] compilationUnits) {
          \t\tif (rejectedScopes.remove(project)) {
          \t\t\tclearScopeDecision(project);
          \t\t\treturn Boolean.FALSE;
          \t\t}
          \t\tSet<String> expected= verifiedClosedScopes.remove(project);
          \t\tSet<String> pending= pendingExpandedScopes.remove(project);
          \t\tif (expected == null) {
          \t\t\texpected= pending;
          \t\t}
          \t\treturn expected == null ? null : Boolean.valueOf(handles(List.of(compilationUnits)).containsAll(expected));
          \t}

          \tprivate void clearScopeDecision(IJavaProject project) {
          \t\tpendingExpandedScopes.remove(project);
          \t\tverifiedClosedScopes.remove(project);
          \t}

          \tprivate static Set<String> handles(Collection<ICompilationUnit> units) {
          ''')

          junit_core = "sandbox_junit_cleanup/src/org/sandbox/jdt/internal/ui/fix/JUnitCleanUpCore.java"
          replace_once(junit_core,
              '''import org.sandbox.jdt.cleanup.multifile.MultiFileCleanUpPlanResult;
          import org.sandbox.jdt.cleanup.multifile.SourceRootPolicy;
          ''',
              '''import org.sandbox.jdt.cleanup.multifile.MultiFileCleanUpPlanResult;
          import org.sandbox.jdt.cleanup.multifile.RelatedCompilationUnitSearch;
          import org.sandbox.jdt.cleanup.multifile.SourceRootPolicy;
          ''')
          replace_once(junit_core,
              '''\tprivate final Map<IJavaProject, Set<String>> pendingExpandedScopes= new HashMap<>();
          ''',
              '''\tprivate final Map<IJavaProject, Set<String>> pendingExpandedScopes= new HashMap<>();
          \tprivate final Map<IJavaProject, Set<String>> verifiedClosedScopes= new HashMap<>();
          \tprivate final Set<IJavaProject> rejectedScopes= new HashSet<>();
          ''')
          replace_once(junit_core,
              '''\t\treturn JUnitMultiFilePlanner.create(project, compilationUnits,
          \t\t\t\tfixes.contains(JUnitCleanUpFixCore.RULEEXTERNALRESOURCE), monitor);
          ''',
              '''\t\tBoolean closedScope= consumeClosedScopeDecision(project, compilationUnits);
          \t\tboolean migrateExternalResourceRules= fixes.contains(JUnitCleanUpFixCore.RULEEXTERNALRESOURCE);
          \t\treturn closedScope == null
          \t\t\t\t? JUnitMultiFilePlanner.create(project, compilationUnits, migrateExternalResourceRules, monitor)
          \t\t\t\t: JUnitMultiFilePlanner.create(project, compilationUnits, migrateExternalResourceRules,
          \t\t\t\t\t\tclosedScope.booleanValue(), monitor);
          ''')
          replace_once(junit_core,
              '''\t\tSet<String> currentHandles= handles(currentScope);
          \t\tSet<String> pendingScope= pendingExpandedScopes.remove(project);
          \t\tif (pendingScope != null && currentHandles.containsAll(pendingScope)) {
          \t\t\treturn List.of();
          \t\t}
          \t\tif (!JUnitScopeCandidateDetector.containsCandidate(project, currentScope, monitor)) {
          \t\t\treturn List.of();
          \t\t}

          \t\tList<ICompilationUnit> projectUnits= JavaProjectCompilationUnits.collect(project, currentScope,
          \t\t\t\tSourceRootPolicy.TEST_ROOTS_AND_SELECTED_SUPPORT);
          \t\tSet<String> projectHandles= handles(projectUnits);
          \t\tif (!currentHandles.containsAll(projectHandles)) {
          \t\t\tpendingExpandedScopes.put(project, projectHandles);
          \t\t}
          \t\treturn projectUnits;
          ''',
              '''\t\tSet<String> currentHandles= handles(currentScope);
          \t\tSet<String> pendingScope= pendingExpandedScopes.get(project);
          \t\tif (pendingScope != null && currentHandles.containsAll(pendingScope)) {
          \t\t\tpendingExpandedScopes.remove(project);
          \t\t\tverifiedClosedScopes.put(project, pendingScope);
          \t\t\treturn List.of();
          \t\t}
          \t\trejectedScopes.remove(project);
          \t\tJUnitScopeCandidateDetector.SearchSeeds seeds=
          \t\t\t\tJUnitScopeCandidateDetector.findSearchSeeds(project, currentScope, monitor);
          \t\tif (!seeds.candidateFound()) {
          \t\t\tclearScopeDecision(project);
          \t\t\treturn List.of();
          \t\t}

          \t\tList<ICompilationUnit> allowedUnits= JavaProjectCompilationUnits.collect(project, currentScope,
          \t\t\t\tSourceRootPolicy.TEST_ROOTS_AND_SELECTED_SUPPORT);
          \t\tList<ICompilationUnit> requiredUnits;
          \t\tif (!seeds.complete()) {
          \t\t\trequiredUnits= allowedUnits;
          \t\t} else {
          \t\t\tRelatedCompilationUnitSearch.Result related= RelatedCompilationUnitSearch.findReferences(project,
          \t\t\t\t\tseeds.elements(), currentScope, allowedUnits, monitor);
          \t\t\tif (!related.complete()) {
          \t\t\t\tclearScopeDecision(project);
          \t\t\t\trejectedScopes.add(project);
          \t\t\t\treturn List.of();
          \t\t\t}
          \t\t\trequiredUnits= related.compilationUnits();
          \t\t}
          \t\treturn registerRequiredScope(project, currentHandles, requiredUnits);
          ''')
          replace_once(junit_core,
              '''\tprivate static Set<String> handles(Collection<ICompilationUnit> units) {
          ''',
              '''\tprivate Collection<ICompilationUnit> registerRequiredScope(IJavaProject project,
          \t\t\tSet<String> currentHandles, Collection<ICompilationUnit> requiredUnits) {
          \t\tSet<String> requiredHandles= handles(requiredUnits);
          \t\tif (currentHandles.containsAll(requiredHandles)) {
          \t\t\tverifiedClosedScopes.put(project, requiredHandles);
          \t\t\tpendingExpandedScopes.remove(project);
          \t\t\treturn List.of();
          \t\t}
          \t\tpendingExpandedScopes.put(project, requiredHandles);
