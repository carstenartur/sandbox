name: Diagnose array conversion reactor

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'sandbox_functional_converter/**'
      - 'sandbox_functional_converter_test/**'
      - 'docs/qa/functional-disabled-tests-audit.md'
      - '.github/workflows/diagnose-array-existing-target.yml'

concurrency:
  group: diagnose-array-existing-target-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      DISPLAY: :0
      MAVEN_OPTS: -Djava.awt.headless=true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install build prerequisites
        run: |
          npm install -g prettier stylelint stylelint-config-standard >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb xauth libgtk-3-0 libxext6 libxrender1 libxtst6 libxi6 libxrandr2 libxfixes3 libasound2t64 libnss3 libgbm1 >/dev/null
      - uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1
        with:
          maven-version: 3.9.14
      - name: Run full reactor and capture failure
        id: reactor
        shell: bash
        run: |
          set +e
          xvfb-run --auto-servernum mvn -e -V -T 1C --batch-mode -Dtycho.localArtifacts=ignore clean verify > reactor.log 2>&1
          status=$?
          {
            echo '## Errors'
            grep -E '\[ERROR\]|BUILD FAILURE|Failed to execute|COMPILATION ERROR|Tycho build extension' reactor.log | tail -n 180 || true
            echo
            echo '## Reactor tail'
            tail -n 350 reactor.log
          } > reactor-tail.txt
          cat reactor-tail.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload diagnostic tail
        uses: actions/upload-artifact@v7
        with:
          name: array-conversion-reactor-tail
          path: reactor-tail.txt
          retention-days: 1
          if-no-files-found: error
      - name: Fail when reactor failed
        if: steps.reactor.outputs.status != '0'
        run: exit 1
