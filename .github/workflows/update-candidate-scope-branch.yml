name: Update candidate scope branch

on:
  push:
    branches: [ issue-1212-candidate-scope ]
    paths:
      - '.github/workflows/update-candidate-scope-branch.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: issue-1212-candidate-scope
          fetch-depth: 0
      - name: Merge current main and retain candidate-scope changes
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git fetch origin main
          # Fail without pushing when the current main cannot be merged cleanly.
          if ! git merge --no-edit origin/main; then
            echo 'Automatic merge failed; unresolved files:'
            git diff --name-only --diff-filter=U
            exit 1
          fi
          git rm .github/workflows/update-candidate-scope-branch.yml
          git commit -m 'Remove candidate branch update workflow'
          git push origin HEAD:issue-1212-candidate-scope
