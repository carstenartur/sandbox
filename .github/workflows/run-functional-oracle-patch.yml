name: Run Functional Oracle Patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/functional-disabled-tests
          fetch-depth: 0
      - name: Execute versioned patch script
        id: patch
        shell: bash
        run: |
          set +e
          python3 <<'PY' > functional-oracle-patch.log 2>&1
          from pathlib import Path

          workflow = Path('.github/workflows/patch-functional-test-oracles.yml').read_text(encoding='utf-8')
          marker = "          python3 <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          embedded = workflow[start:end]
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in embedded.splitlines())
          exec(compile(script, 'patch-functional-test-oracles.py', 'exec'))
          PY
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          cat functional-oracle-patch.log
          exit 0
      - name: Upload patch diagnostics
        if: steps.patch.outputs.status != '0'
        uses: actions/upload-artifact@v7
        with:
          name: functional-oracle-patch-diagnostics
          path: functional-oracle-patch.log
          if-no-files-found: error
      - name: Fail after diagnostic upload
        if: steps.patch.outputs.status != '0'
        run: exit 1
      - name: Commit patched test oracles and remove helper workflows
        if: steps.patch.outputs.status == '0'
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/patch-functional-test-oracles.yml
          git rm .github/workflows/run-functional-oracle-patch.yml
          git add sandbox_functional_converter_test/src/org/sandbox/jdt/ui/tests/quickfix/
          git commit -m 'test: align functional expectations with canonical renderer'
          git push origin HEAD:fix/functional-disabled-tests
