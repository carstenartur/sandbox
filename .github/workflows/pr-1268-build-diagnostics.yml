name: PR 1268 Build Diagnostics

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ issue-1251-concrete-collectors ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pr-1268-build-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  targeted-package:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v6
        with:
          ref: issue-1251-concrete-collectors
          fetch-depth: 1
      - name: Remove orphaned complex-chain expectation
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('sandbox_functional_converter_test/src/org/sandbox/jdt/ui/tests/quickfix/LoopRefactoringMapFilterTest.java')
          text = path.read_text(encoding='utf-8')
          method_start = text.index('void testFilterMapCollect()')
          method_end = text.index('\n\t}', method_start)
          region = text[method_start:method_end]
          marker = '\n\t\tString expected = """'
          occurrences = []
          offset = 0
          while True:
              position = region.find(marker, offset)
              if position < 0:
                  break
              occurrences.append(position)
              offset = position + len(marker)
          if len(occurrences) > 2:
              raise SystemExit(f'Unexpected number of expected blocks in testFilterMapCollect: {len(occurrences)}')
          if len(occurrences) == 2:
              duplicate_start = method_start + occurrences[1]
              duplicate_end = text.index('\n\t\tIPackageFragment pack', duplicate_start)
              text = text[:duplicate_start] + text[duplicate_end:]
              path.write_text(text, encoding='utf-8')
          PY
          if git diff --quiet -- sandbox_functional_converter_test/src/org/sandbox/jdt/ui/tests/quickfix/LoopRefactoringMapFilterTest.java; then
            echo 'Map/filter regression test is already structurally valid.'
          else
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add sandbox_functional_converter_test/src/org/sandbox/jdt/ui/tests/quickfix/LoopRefactoringMapFilterTest.java
            git commit -m 'Remove orphaned complex-chain expectation'
            git push origin HEAD:issue-1251-concrete-collectors
          fi
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1
        with:
          maven-version: 3.9.14
      - name: Package functional converter reactor without running tests
        run: |
          set +e
          mvn -B -DskipTests \
            -pl sandbox_target,sandbox-functional-converter-core,sandbox_common_core,sandbox_common,sandbox_test_commons,sandbox_functional_converter,sandbox_functional_converter_test \
            -am clean package > targeted-build.log 2>&1
          status=$?
          set -e
          if (( status != 0 )); then
            echo '::group::Relevant Maven failure lines'
            grep -nE '^\[ERROR\]|BUILD FAILURE|Failed to execute goal|Tests run:|Failures:|Errors:|SpotBugs|Compilation failure|BugInstance' \
              targeted-build.log | tail -250 || true
            echo '::endgroup::'
            echo '::group::Final 250 build lines'
            tail -250 targeted-build.log
            echo '::endgroup::'
            exit "$status"
          fi
          tail -80 targeted-build.log
      - name: Upload targeted build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pr-1268-targeted-build-${{ github.sha }}
          path: targeted-build.log
          retention-days: 3
          if-no-files-found: error
