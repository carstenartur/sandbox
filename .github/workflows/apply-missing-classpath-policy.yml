name: Apply missing classpath policy

on:
  push:
    branches: [ issue-1224-source-root-policy ]
    paths:
      - '.github/workflows/apply-missing-classpath-policy.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: issue-1224-source-root-policy
          fetch-depth: 0
      - name: Apply fail-closed classpath metadata patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if text.count(old) != 1:
                  raise SystemExit(f'Expected one match in {path}, found {text.count(old)}')
              file.write_text(text.replace(old, new), encoding='utf-8')

          replace_once(
              'sandbox_common/src/org/sandbox/jdt/cleanup/multifile/JavaProjectCompilationUnits.java',
              '''\t\tIClasspathEntry entry= root.getResolvedClasspathEntry();
          \t\tif (entry == null) {
          \t\t\tentry= root.getRawClasspathEntry();
          \t\t}
          \t\tif (entry != null && entry.isTest()) {
          ''',
              '''\t\tIClasspathEntry entry= root.getResolvedClasspathEntry();
          \t\tif (entry == null) {
          \t\t\tentry= root.getRawClasspathEntry();
          \t\t}
          \t\tif (entry == null) {
          \t\t\treturn SourceRootKind.EXCLUDED;
          \t\t}
          \t\tif (entry.isTest()) {
          ''')

          test_path = 'sandbox_common_test/src/org/sandbox/jdt/cleanup/multifile/JavaProjectCompilationUnitsTest.java'
          replace_once(test_path,
              '''\t\t\t\tnew RootSpec("entryOutput", "/project/target/test-classes/generated", false, false, //$NON-NLS-1$ //$NON-NLS-2$
          \t\t\t\t\t\tIPackageFragmentRoot.K_SOURCE, "/project/target/test-classes"), //$NON-NLS-1$
          \t\t\t\tnew RootSpec("binary", "/project/lib", false, false, IPackageFragmentRoot.K_BINARY)); //$NON-NLS-1$ //$NON-NLS-2$
          ''',
              '''\t\t\t\tnew RootSpec("entryOutput", "/project/target/test-classes/generated", false, false, //$NON-NLS-1$ //$NON-NLS-2$
          \t\t\t\t\t\tIPackageFragmentRoot.K_SOURCE, "/project/target/test-classes"), //$NON-NLS-1$
          \t\t\t\tnew RootSpec("missingMetadata", "/project/src/broken/java", false, false, //$NON-NLS-1$ //$NON-NLS-2$
          \t\t\t\t\t\tIPackageFragmentRoot.K_SOURCE, null, false),
          \t\t\t\tnew RootSpec("binary", "/project/lib", false, false, IPackageFragmentRoot.K_BINARY)); //$NON-NLS-1$ //$NON-NLS-2$
          ''')
          replace_once(test_path,
              '''\t\tassertEquals(SourceRootKind.OUTPUT, JavaProjectCompilationUnits.classify(fixture.root("entryOutput"))); //$NON-NLS-1$
          \t\tassertEquals(SourceRootKind.EXCLUDED, JavaProjectCompilationUnits.classify(fixture.root("binary"))); //$NON-NLS-1$
          ''',
              '''\t\tassertEquals(SourceRootKind.OUTPUT, JavaProjectCompilationUnits.classify(fixture.root("entryOutput"))); //$NON-NLS-1$
          \t\tassertEquals(SourceRootKind.EXCLUDED,
          \t\t\t\tJavaProjectCompilationUnits.classify(fixture.root("missingMetadata"))); //$NON-NLS-1$
          \t\tassertEquals(SourceRootKind.EXCLUDED, JavaProjectCompilationUnits.classify(fixture.root("binary"))); //$NON-NLS-1$
          ''')
          replace_once(test_path,
              '''\tprivate record RootSpec(String handle, String path, boolean test, boolean derived, int kind,
          \t\t\tString entryOutputPath) {
          \t\tRootSpec(String handle, String path, boolean test, boolean derived, int kind) {
          \t\t\tthis(handle, path, test, derived, kind, null);
          \t\t}
          \t}
          ''',
              '''\tprivate record RootSpec(String handle, String path, boolean test, boolean derived, int kind,
          \t\t\tString entryOutputPath, boolean classpathMetadataPresent) {
          \t\tRootSpec(String handle, String path, boolean test, boolean derived, int kind) {
          \t\t\tthis(handle, path, test, derived, kind, null, true);
          \t\t}

          \t\tRootSpec(String handle, String path, boolean test, boolean derived, int kind, String entryOutputPath) {
          \t\t\tthis(handle, path, test, derived, kind, entryOutputPath, true);
          \t\t}
          \t}
          ''')
          replace_once(test_path,
              '''\t\t\t\tcase "getResolvedClasspathEntry", "getRawClasspathEntry" -> entry; //$NON-NLS-1$ //$NON-NLS-2$
          ''',
              '''\t\t\t\tcase "getResolvedClasspathEntry", "getRawClasspathEntry" -> spec.classpathMetadataPresent() //$NON-NLS-1$ //$NON-NLS-2$
          \t\t\t\t\t\t? entry
          \t\t\t\t\t\t: null;
          ''')
          PY
          git diff --check
      - name: Commit fix and remove one-shot workflow
        shell: bash
        run: |
          git rm .github/workflows/apply-missing-classpath-policy.yml
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add sandbox_common sandbox_common_test
          git commit -m 'Exclude source roots with missing classpath metadata'
          git push origin HEAD:issue-1224-source-root-policy
