name: Multi-file cleanup build diagnostics

on:
  push:
    branches:
      - feature/multifile-cleanup-planning
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-log:
    runs-on: ubuntu-latest
    env:
      DISPLAY: :0
      MAVEN_OPTS: -Djava.awt.headless=true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm install -g prettier stylelint stylelint-config-standard
      - run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xauth \
            libgtk-3-0 libxext6 libxrender1 libxtst6 libxi6 libxrandr2 libxfixes3 \
            libasound2t64 libnss3 libgbm1
      - uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1
        with:
          maven-version: 3.9.14
      - name: Build and capture complete log
        shell: bash
        run: |
          set -o pipefail
          xvfb-run --auto-servernum mvn -e -V -T 1C --batch-mode \
            -Dtycho.localArtifacts=ignore clean verify 2>&1 | tee build.log
      - name: Upload complete Maven log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: multifile-build-log-${{ github.run_number }}
          path: build.log
          retention-days: 3
