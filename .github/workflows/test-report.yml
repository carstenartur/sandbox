name: Test Source Inventory

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Refresh the static source inventory daily at 00:00 UTC.
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-test-inventory:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Generate static test source inventory
      run: |
        python3 .github/scripts/generate_test_report.py

    - name: Upload test source inventory as artifact
      uses: actions/upload-artifact@v7
      with:
        name: test-source-inventory
        path: |
          test-report.md
          test-report.json
        retention-days: 9

    - name: Display inventory summary
      run: |
        echo "## Static Test Source Inventory" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "> This workflow scans source annotations. It does not compile or execute tests and is not a build-success signal. Use **Java CI with Maven** for authoritative build and test status." >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        cat test-report.md >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "---" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "### Deployed historical reports" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "[View generated reports](https://carstenartur.github.io/sandbox/tests/)" >> "$GITHUB_STEP_SUMMARY"

    - name: Comment PR with static inventory
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v8
      with:
        script: |
          try {
            const fs = require('fs');
            const report = fs.readFileSync('test-report.md', 'utf8');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('<!-- sandbox-test-source-inventory -->')
            );

            const workflowUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commentBody = `<!-- sandbox-test-source-inventory -->\n> **Static source inventory only:** this workflow does not compile or execute tests. The authoritative build/test signal is **Java CI with Maven**.\n\n${report}\n\n---\n*Generated by the [Test Source Inventory workflow](${workflowUrl})*`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }
          } catch (e) {
            core.warning('Could not post test source inventory comment: ' + e.message);
          }
