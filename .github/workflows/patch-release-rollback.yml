name: Patch release rollback lease

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ issue-1215-distribution-smoke ]

permissions:
  contents: write

concurrency:
  group: patch-release-rollback
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: issue-1215-distribution-smoke
          fetch-depth: 1
      - name: Complete distribution publication hardening
        run: |
          python3 - <<'PY'
          from pathlib import Path

          release_path = Path('.github/workflows/deploy-release.yml')
          release = release_path.read_text(encoding='utf-8')
          if 'id: gh_pages_after' not in release:
              marker = '      - name: Verify advertised release URLs\n'
              dollar = '$'
              capture = (
                  '      - name: Capture deployed gh-pages revision\n'
                  '        id: gh_pages_after\n'
                  f'        if: {dollar}{{{{ !inputs.dry_run }}}}\n'
                  '        run: |\n'
                  '          git -C gh-pages-repo fetch origin gh-pages\n'
                  '          echo "sha=$(git -C gh-pages-repo rev-parse origin/gh-pages)" >> "$GITHUB_OUTPUT"\n\n'
              )
              if marker not in release:
                  raise SystemExit('Release URL verification marker not found')
              release = release.replace(marker, capture + marker, 1)

          rollback_start = release.index('      - name: Roll back a failed release-site verification\n')
          rollback_end = release.index('      - name: Upload release distribution evidence\n', rollback_start)
          dollar = '$'
          rollback = (
              '      - name: Roll back a failed release-site verification\n'
              f'        if: {dollar}{{{{ failure() && !inputs.dry_run && steps.deploy_release_site.outcome == \'success\' && steps.verify_release_urls.outcome == \'failure\' }}}}\n'
              '        run: |\n'
              '          set -euo pipefail\n'
              f'          previous="{dollar}{{{{ steps.gh_pages_before.outputs.sha }}}}"\n'
              f'          deployed="{dollar}{{{{ steps.gh_pages_after.outputs.sha }}}}"\n'
              '          if [[ -z "$previous" || -z "$deployed" ]]; then\n'
              '            echo \'::error::The previous or deployed gh-pages revision was not captured.\'\n'
              '            exit 1\n'
              '          fi\n'
              '          git -C gh-pages-repo push \\\n'
              '            --force-with-lease=refs/heads/gh-pages:${deployed} \\\n'
              '            origin "${previous}:refs/heads/gh-pages"\n'
              '          echo "Rolled gh-pages back from ${deployed} to ${previous}." \\\n'
              '            | tee target/distribution-verification/release-publication-rollback.log\n\n'
          )
          release = release[:rollback_start] + rollback + release[rollback_end:]
          release_path.write_text(release, encoding='utf-8')

          readme_path = Path('README.md')
          readme = readme_path.read_text(encoding='utf-8')
          compatibility_link = (
              '- **[Distribution Compatibility](docs/distribution-compatibility.md)** '
              '- Supported build matrix, runtime coverage, publication gates, and evidence'
          )
          if compatibility_link not in readme:
              marker = (
                  '- **[Release Process](CONTRIBUTING.md#release-process)** '
                  '- Maintainer guide for creating releases'
              )
              if marker not in readme:
                  raise SystemExit('README release-process link marker not found')
              readme = readme.replace(marker, marker + '\n' + compatibility_link, 1)
              readme_path.write_text(readme, encoding='utf-8')

          validator_path = Path('.github/scripts/verify_distribution_artifacts.py')
          validator = validator_path.read_text(encoding='utf-8')
          if '"artifactSha256": feature_sha256' not in validator:
              function_start = validator.index('def verify_repository(')
              function_end = validator.index('\ndef find_product_root(', function_start)
              replacement = '''def verify_repository(repository: Path, published_features: list[str]) -> dict[str, object]:
              if not repository.is_dir():
                  fail(f"Built p2 repository does not exist: {repository}")

              content = xml_from_repository(repository, "content")
              artifacts = xml_from_repository(repository, "artifacts")
              units = {
                  unit.attrib.get("id", ""): unit.attrib.get("version", "")
                  for unit in content.findall("./units/unit")
                  if unit.attrib.get("id")
              }
              missing_units = [
                  f"{feature}.feature.group"
                  for feature in published_features
                  if f"{feature}.feature.group" not in units
              ]
              if missing_units:
                  fail(f"Published feature IUs missing from content metadata: {missing_units}")

              seen_keys: set[tuple[str, str, str]] = set()
              feature_artifacts: dict[tuple[str, str], dict[str, object]] = {}
              checked_files = 0
              checksum_count = 0
              missing_files: list[str] = []
              checksum_errors: list[str] = []
              for artifact in artifacts.findall("./artifacts/artifact"):
                  classifier = artifact.attrib.get("classifier", "")
                  identifier = artifact.attrib.get("id", "")
                  version = artifact.attrib.get("version", "")
                  key = classifier, identifier, version
                  if key in seen_keys:
                      fail(f"Duplicate p2 artifact key: {key}")
                  seen_keys.add(key)
                  artifact_file = artifact_path(repository, classifier, identifier, version)
                  if artifact_file is None:
                      continue
                  checked_files += 1
                  if not artifact_file.is_file():
                      missing_files.append(str(artifact_file.relative_to(repository)))
                      continue
                  properties = artifact_properties(artifact)
                  size = properties.get("download.size") or properties.get("artifact.size")
                  if size and size.isdigit() and artifact_file.stat().st_size != int(size):
                      checksum_errors.append(
                          f"{artifact_file.name}: size {artifact_file.stat().st_size}, metadata {size}"
                      )
                  feature_sha256 = digest(artifact_file, "sha256")
                  if classifier == "org.eclipse.update.feature" and identifier in published_features:
                      feature_artifacts[(identifier, version)] = {
                          "id": identifier,
                          "iu": f"{identifier}.feature.group",
                          "version": version,
                          "artifactSize": artifact_file.stat().st_size,
                          "artifactSha256": feature_sha256,
                      }
                  for name, value in properties.items():
                      lowered = name.lower()
                      if re.fullmatch(r"[0-9a-fA-F]{64}", value) and (
                          "sha-256" in lowered or "sha256" in lowered
                      ):
                          checksum_count += 1
                          if feature_sha256.lower() != value.lower():
                              checksum_errors.append(f"{artifact_file.name}: SHA-256 mismatch")
                      elif re.fullmatch(r"[0-9a-fA-F]{32}", value) and "md5" in lowered:
                          checksum_count += 1
                          if digest(artifact_file, "md5").lower() != value.lower():
                              checksum_errors.append(f"{artifact_file.name}: MD5 mismatch")
              if missing_files:
                  fail(f"p2 artifact metadata references missing files: {missing_files[:20]}")
              if checksum_errors:
                  fail(f"p2 artifact integrity errors: {checksum_errors[:20]}")
              if checked_files == 0:
                  fail("No bundle or feature artifacts were validated")

              published_evidence: list[dict[str, object]] = []
              for feature in published_features:
                  version = units[f"{feature}.feature.group"]
                  evidence = feature_artifacts.get((feature, version))
                  if evidence is None:
                      fail(f"Published feature artifact missing for exact IU version: {feature}/{version}")
                  published_evidence.append(evidence)

              return {
                  "path": str(repository),
                  "metadataUnits": len(units),
                  "artifactKeys": len(seen_keys),
                  "artifactFilesChecked": checked_files,
                  "checksumsChecked": checksum_count,
                  "publishedFeatures": published_evidence,
              }

              '''
              replacement = '\n'.join(line[14:] if line.startswith('              ') else line for line in replacement.splitlines())
              validator = validator[:function_start] + replacement + validator[function_end + 1:]
              validator_path.write_text(validator, encoding='utf-8')
          PY
          if git diff --quiet -- .github/workflows/deploy-release.yml README.md .github/scripts/verify_distribution_artifacts.py; then
            echo 'Distribution publication hardening is already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/deploy-release.yml README.md .github/scripts/verify_distribution_artifacts.py
          git commit -m 'Complete exact distribution publication evidence'
          git push origin HEAD:issue-1215-distribution-smoke
