name: Patch release rollback lease

on:
  push:
    branches: [ issue-1215-distribution-smoke ]

permissions:
  contents: write

concurrency:
  group: patch-release-rollback
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: issue-1215-distribution-smoke
          fetch-depth: 0
      - name: Complete distribution publication hardening
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/deploy-release.yml')
          text = path.read_text(encoding='utf-8')
          if 'id: gh_pages_after' not in text:
              marker = '      - name: Verify advertised release URLs\n'
              dollar = '$'
              capture = (
                  '      - name: Capture deployed gh-pages revision\n'
                  '        id: gh_pages_after\n'
                  f'        if: {dollar}{{{{ !inputs.dry_run }}}}\n'
                  '        run: |\n'
                  '          git -C gh-pages-repo fetch origin gh-pages\n'
                  '          echo "sha=$(git -C gh-pages-repo rev-parse origin/gh-pages)" >> "$GITHUB_OUTPUT"\n\n'
              )
              if marker not in text:
                  raise SystemExit('Release URL verification marker not found')
              text = text.replace(marker, capture + marker, 1)

          start_marker = '      - name: Roll back a failed release-site verification\n'
          end_marker = '      - name: Upload release distribution evidence\n'
          start = text.index(start_marker)
          end = text.index(end_marker, start)
          dollar = '$'
          rollback = (
              '      - name: Roll back a failed release-site verification\n'
              f'        if: {dollar}{{{{ failure() && !inputs.dry_run && steps.deploy_release_site.outcome == \'success\' && steps.verify_release_urls.outcome == \'failure\' }}}}\n'
              '        run: |\n'
              '          set -euo pipefail\n'
              f'          previous="{dollar}{{{{ steps.gh_pages_before.outputs.sha }}}}"\n'
              f'          deployed="{dollar}{{{{ steps.gh_pages_after.outputs.sha }}}}"\n'
              '          if [[ -z "$previous" || -z "$deployed" ]]; then\n'
              '            echo \'::error::The previous or deployed gh-pages revision was not captured.\'\n'
              '            exit 1\n'
              '          fi\n'
              '          git -C gh-pages-repo push \\\n'
              '            --force-with-lease=refs/heads/gh-pages:${deployed} \\\n'
              '            origin "${previous}:refs/heads/gh-pages"\n'
              '          echo "Rolled gh-pages back from ${deployed} to ${previous}." \\\n'
              '            | tee target/distribution-verification/release-publication-rollback.log\n\n'
          )
          text = text[:start] + rollback + text[end:]
          path.write_text(text, encoding='utf-8')

          readme_path = Path('README.md')
          readme = readme_path.read_text(encoding='utf-8')
          link = ('- **[Distribution Compatibility](docs/distribution-compatibility.md)** '
                  '- Supported build matrix, runtime coverage, publication gates, and evidence')
          if link not in readme:
              marker = ('- **[Release Process](CONTRIBUTING.md#release-process)** '
                        '- Maintainer guide for creating releases')
              if marker not in readme:
                  raise SystemExit('README release-process link marker not found')
              readme = readme.replace(marker, marker + '\n' + link, 1)
              readme_path.write_text(readme, encoding='utf-8')

          validator_path = Path('.github/scripts/verify_distribution_artifacts.py')
          validator = validator_path.read_text(encoding='utf-8')
          if 'feature_artifacts: dict[tuple[str, str], dict[str, object]]' not in validator:
              marker = '    checksum_errors: list[str] = []\n'
              if marker not in validator:
                  raise SystemExit('Validator checksum marker not found')
              validator = validator.replace(
                  marker,
                  marker + '    feature_artifacts: dict[tuple[str, str], dict[str, object]] = {}\n',
                  1,
              )
              marker = '        properties = artifact_properties(artifact)\n'
              evidence = (
                  '        if classifier == "org.eclipse.update.feature" and identifier in published_features:\n'
                  '            feature_artifacts[(identifier, version)] = {\n'
                  '                "id": identifier,\n'
                  '                "iu": f"{identifier}.feature.group",\n'
                  '                "version": version,\n'
                  '                "artifactSize": path.stat().st_size,\n'
                  '                "artifactSha256": digest(path, "sha256"),\n'
                  '            }\n'
              )
              if marker not in validator:
                  raise SystemExit('Validator artifact-property marker not found')
              validator = validator.replace(marker, evidence + marker, 1)
              marker = '    if checked_files == 0:\n        fail("No bundle or feature artifacts were validated")\n\n'
              published = (
                  '    published_evidence: list[dict[str, object]] = []\n'
                  '    for feature in published_features:\n'
                  '        version = units[f"{feature}.feature.group"]\n'
                  '        evidence = feature_artifacts.get((feature, version))\n'
                  '        if evidence is None:\n'
                  '            fail(f"Published feature artifact missing for exact IU version: {feature}/{version}")\n'
                  '        published_evidence.append(evidence)\n\n'
              )
              if marker not in validator:
                  raise SystemExit('Validator checked-files marker not found')
              validator = validator.replace(marker, marker + published, 1)
              old = (
                  '        "publishedFeatures": [\n'
                  '            {"id": feature, "iu": f"{feature}.feature.group", "version": units[f"{feature}.feature.group"]}\n'
                  '            for feature in published_features\n'
                  '        ],\n'
              )
              if old not in validator:
                  raise SystemExit('Validator published-features return block not found')
              validator = validator.replace(old, '        "publishedFeatures": published_evidence,\n', 1)
              validator_path.write_text(validator, encoding='utf-8')
          PY
          if git diff --quiet -- .github/workflows/deploy-release.yml README.md .github/scripts/verify_distribution_artifacts.py; then
            echo 'Distribution publication hardening is already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/deploy-release.yml README.md .github/scripts/verify_distribution_artifacts.py
          git commit -m 'Complete exact distribution publication evidence'
          git push origin HEAD:issue-1215-distribution-smoke
