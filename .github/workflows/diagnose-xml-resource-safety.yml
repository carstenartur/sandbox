name: Diagnose XML resource safety

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'sandbox_xml_cleanup/**'
      - 'sandbox_xml_cleanup_test/**'
      - '.github/workflows/diagnose-xml-resource-safety.yml'

permissions:
  contents: read

jobs:
  verify-xml-cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1
        with:
          maven-version: 3.9.14
      - name: Install the local target definition
        run: >-
          mvn --batch-mode -ntp
          -pl sandbox_target -am
          -DskipTests -Dspotbugs.skip=true -Djacoco.skip=true
          install
      - name: Verify XML cleanup and tests
        shell: bash
        run: |
          set +e
          # Tycho does not infer reactor inclusion for Require-Bundle/Fragment-Host
          # dependencies from Maven -am. Select the local prerequisite bundles
          # explicitly so the focused reactor matches the OSGi dependency graph.
          mvn --batch-mode -ntp \
            -pl sandbox_common,sandbox_test_commons,sandbox_xml_cleanup_test -am \
            -Djacoco.skip=true \
            clean verify > xml-resource-safety.log 2>&1
          status=$?
          tail -n 200 xml-resource-safety.log
          exit "$status"
      - name: Upload focused build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: xml-resource-safety-log
          path: xml-resource-safety.log
          retention-days: 2
          if-no-files-found: error
