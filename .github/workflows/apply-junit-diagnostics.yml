name: Apply JUnit diagnostics

on:
  push:
    branches: [ issue-1214-cleanup-diagnostics ]
    paths:
      - '.github/workflows/apply-junit-diagnostics.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: issue-1214-cleanup-diagnostics
          fetch-depth: 0
      - name: Apply verified candidate diagnostics patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('sandbox_junit_cleanup/src/org/sandbox/jdt/internal/corext/fix/multifile/JUnitMultiFilePlanner.java')
          text = path.read_text(encoding='utf-8')

          def replace_once(old: str, new: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected exactly one match, found {count}: {old[:100]!r}')
              text = text.replace(old, new)

          replace_once(
              '''import org.sandbox.jdt.cleanup.multifile.MultiFileCleanUpPlanResult;
          import org.sandbox.jdt.cleanup.multifile.MultiFilePlanningBudget;
          ''',
              '''import org.sandbox.jdt.cleanup.multifile.MultiFileCandidateDiagnostic;
          import org.sandbox.jdt.cleanup.multifile.MultiFileCandidateOutcome;
          import org.sandbox.jdt.cleanup.multifile.MultiFileCleanUpDiagnostics;
          import org.sandbox.jdt.cleanup.multifile.MultiFileCleanUpPlanResult;
          import org.sandbox.jdt.cleanup.multifile.MultiFilePlanningBudget;
          import org.sandbox.jdt.cleanup.multifile.MultiFileScopeDiagnostic;
          ''')

          replace_once(
              '''\tprivate record RuleField(String unitHandle, String declaringTypeKey, String fieldName, String fieldTypeKey,
          \t\t\tRuleKind kind, boolean isStatic, String initializerSource) {
          ''',
              '''\tprivate record RuleField(String candidateId, String unitHandle, String declaringTypeKey, String fieldName,
          \t\t\tString fieldTypeKey, RuleKind kind, boolean isStatic, String initializerSource) {
          ''')

          replace_once(
              '''\t\tMap<String, ResourceType> resourcesByTypeKey= collectResourceTypes(rootsByHandle, monitor);
          \t\tMultiFilePlanningBudget.checkCanceled(monitor);
          \t\tList<RuleField> ruleFields= collectRuleFields(rootsByHandle, resourcesByTypeKey, monitor);
          \t\tRefactoringStatus status= budget.status();
          \t\tMultiFilePlanningBudget.checkCanceled(monitor);
          \t\tList<ExternalResourceRuleMigration> migrations= createMigrations(ruleFields, resourcesByTypeKey, status,
          \t\t\t\tmonitor);
          ''',
              '''\t\tList<MultiFileCandidateDiagnostic> candidateDiagnostics= new ArrayList<>();
          \t\tMap<String, ResourceType> resourcesByTypeKey= collectResourceTypes(rootsByHandle,
          \t\t\t\tcandidateDiagnostics, monitor);
          \t\tMultiFilePlanningBudget.checkCanceled(monitor);
          \t\tList<RuleField> ruleFields= collectRuleFields(rootsByHandle, resourcesByTypeKey,
          \t\t\t\tcandidateDiagnostics, monitor);
          \t\tRefactoringStatus status= budget.status();
          \t\tMultiFilePlanningBudget.checkCanceled(monitor);
          \t\tList<ExternalResourceRuleMigration> migrations= createMigrations(ruleFields, resourcesByTypeKey, status,
          \t\t\t\tcandidateDiagnostics, monitor);
          ''')

          replace_once(
              '''\t\tif (status.hasFatalError()) {
          \t\t\treturn new MultiFileCleanUpPlanResult<>(null, status, metrics);
          \t\t}
          \t\treturn MultiFileCleanUpPlanResult.success(new JUnitMigrationPlan(selectedScope, migrations), status,
          \t\t\t\tmetrics);
          ''',
              '''\t\tMultiFileCleanUpDiagnostics diagnostics= new MultiFileCleanUpDiagnostics("junit-external-resource", //$NON-NLS-1$
          \t\t\t\tMultiFileScopeDiagnostic.empty(), candidateDiagnostics);
          \t\tif (status.hasFatalError()) {
          \t\t\treturn new MultiFileCleanUpPlanResult<>(null, status, metrics, diagnostics);
          \t\t}
          \t\treturn MultiFileCleanUpPlanResult.success(new JUnitMigrationPlan(selectedScope, migrations), status,
          \t\t\t\tmetrics, diagnostics);
          ''')

          replace_once(
              '''\tprivate static Map<String, ResourceType> collectResourceTypes(
          \t\t\tMap<String, CompilationUnit> rootsByHandle, IProgressMonitor monitor) {
          ''',
              '''\tprivate static Map<String, ResourceType> collectResourceTypes(
          \t\t\tMap<String, CompilationUnit> rootsByHandle,
          \t\t\tList<MultiFileCandidateDiagnostic> diagnostics, IProgressMonitor monitor) {
          ''')

          replace_once(
              '''\t\t\t\t\tresult.put(binding.getKey(), new ResourceType(binding.getKey(), unitHandle,
          \t\t\t\t\t\t\tbinding.getQualifiedName(), beforeMethod, afterMethod));
          \t\t\t\t\treturn false;
          ''',
              '''\t\t\t\t\tresult.put(binding.getKey(), new ResourceType(binding.getKey(), unitHandle,
          \t\t\t\t\t\t\tbinding.getQualifiedName(), beforeMethod, afterMethod));
          \t\t\t\t\tdiagnostics.add(new MultiFileCandidateDiagnostic(binding.getKey(), unitHandle,
          \t\t\t\t\t\t\tMultiFileCandidateOutcome.FOUND, "EXTERNAL_RESOURCE_TYPE_FOUND", //$NON-NLS-1$
          \t\t\t\t\t\t\t"A source type directly extending JUnit 4 ExternalResource was found.", //$NON-NLS-1$
          \t\t\t\t\t\t\tList.of(unitHandle)));
          \t\t\t\t\treturn false;
          ''')

          replace_once(
              '''\tprivate static List<RuleField> collectRuleFields(Map<String, CompilationUnit> rootsByHandle,
          \t\t\tMap<String, ResourceType> resourcesByTypeKey, IProgressMonitor monitor) {
          ''',
              '''\tprivate static List<RuleField> collectRuleFields(Map<String, CompilationUnit> rootsByHandle,
          \t\t\tMap<String, ResourceType> resourcesByTypeKey,
          \t\t\tList<MultiFileCandidateDiagnostic> diagnostics, IProgressMonitor monitor) {
          ''')

          replace_once(
              '''\t\t\t\t\tRuleKind kind= ruleKind(node);
          \t\t\t\t\tif (kind == null || node.fragments().size() != 1) {
          \t\t\t\t\t\treturn true;
          \t\t\t\t\t}
          \t\t\t\t\tITypeBinding declaringType= declaringType(node);
          \t\t\t\t\tITypeBinding fieldType= node.getType().resolveBinding();
          \t\t\t\t\tif (declaringType == null || fieldType == null || !resourcesByTypeKey.containsKey(fieldType.getKey())) {
          \t\t\t\t\t\treturn true;
          \t\t\t\t\t}
          \t\t\t\t\tVariableDeclarationFragment fragment= (VariableDeclarationFragment) node.fragments().get(0);
          \t\t\t\t\tIVariableBinding variable= fragment.resolveBinding();
          \t\t\t\t\tif (variable == null || fragment.getInitializer() == null) {
          \t\t\t\t\t\treturn true;
          \t\t\t\t\t}
          \t\t\t\t\tboolean isStatic= Modifier.isStatic(variable.getModifiers());
          \t\t\t\t\tif ((kind == RuleKind.CLASS && !isStatic) || (kind == RuleKind.INSTANCE && isStatic)) {
          \t\t\t\t\t\treturn true;
          \t\t\t\t\t}
          \t\t\t\t\tresult.add(new RuleField(unitHandle, declaringType.getKey(), variable.getName(), fieldType.getKey(),
          \t\t\t\t\t\t\tkind, isStatic, fragment.getInitializer().toString()));
          ''',
              '''\t\t\t\t\tRuleKind kind= ruleKind(node);
          \t\t\t\t\tif (kind == null) {
          \t\t\t\t\t\treturn true;
          \t\t\t\t\t}
          \t\t\t\t\tString candidateId= unitHandle + "#field:" + node.getStartPosition(); //$NON-NLS-1$
          \t\t\t\t\tif (node.fragments().size() != 1) {
          \t\t\t\t\t\tdiagnostics.add(MultiFileCandidateDiagnostic.rejected(candidateId, unitHandle,
          \t\t\t\t\t\t\t\t"MULTI_FRAGMENT_RULE_FIELD", //$NON-NLS-1$
          \t\t\t\t\t\t\t\t"A Rule declaration with multiple field fragments cannot be migrated atomically.", //$NON-NLS-1$
          \t\t\t\t\t\t\t\tList.of(unitHandle)));
          \t\t\t\t\t\treturn true;
          \t\t\t\t\t}
          \t\t\t\t\tITypeBinding declaringType= declaringType(node);
          \t\t\t\t\tITypeBinding fieldType= node.getType().resolveBinding();
          \t\t\t\t\tif (declaringType == null || fieldType == null) {
          \t\t\t\t\t\tdiagnostics.add(MultiFileCandidateDiagnostic.rejected(candidateId, unitHandle,
          \t\t\t\t\t\t\t\t"UNRESOLVED_RULE_BINDING", //$NON-NLS-1$
          \t\t\t\t\t\t\t\t"The Rule field or declaring type binding could not be resolved.", List.of(unitHandle))); //$NON-NLS-1$
          \t\t\t\t\t\treturn true;
          \t\t\t\t\t}
          \t\t\t\t\tResourceType resource= resourcesByTypeKey.get(fieldType.getKey());
          \t\t\t\t\tif (resource == null) {
          \t\t\t\t\t\tdiagnostics.add(MultiFileCandidateDiagnostic.rejected(candidateId, unitHandle,
          \t\t\t\t\t\t\t\t"UNSUPPORTED_RESOURCE_TYPE", //$NON-NLS-1$
          \t\t\t\t\t\t\t\t"The Rule field type is not a source ExternalResource candidate in the closed scope.", //$NON-NLS-1$
          \t\t\t\t\t\t\t\tList.of(unitHandle)));
          \t\t\t\t\t\treturn true;
          \t\t\t\t\t}
          \t\t\t\t\tVariableDeclarationFragment fragment= (VariableDeclarationFragment) node.fragments().get(0);
          \t\t\t\t\tIVariableBinding variable= fragment.resolveBinding();
          \t\t\t\t\tif (variable == null || fragment.getInitializer() == null) {
          \t\t\t\t\t\tdiagnostics.add(MultiFileCandidateDiagnostic.rejected(candidateId, unitHandle,
          \t\t\t\t\t\t\t\t"UNSUPPORTED_RULE_FIELD_SHAPE", //$NON-NLS-1$
          \t\t\t\t\t\t\t\t"The Rule field needs one resolved variable and an initializer.", //$NON-NLS-1$
          \t\t\t\t\t\t\t\tList.of(resource.unitHandle(), unitHandle)));
          \t\t\t\t\t\treturn true;
          \t\t\t\t\t}
          \t\t\t\t\tboolean isStatic= Modifier.isStatic(variable.getModifiers());
          \t\t\t\t\tif ((kind == RuleKind.CLASS && !isStatic) || (kind == RuleKind.INSTANCE && isStatic)) {
          \t\t\t\t\t\tdiagnostics.add(MultiFileCandidateDiagnostic.rejected(candidateId, unitHandle,
          \t\t\t\t\t\t\t\t"RULE_STATICNESS_MISMATCH", //$NON-NLS-1$
          \t\t\t\t\t\t\t\t"@ClassRule must be static and @Rule must be an instance field.", //$NON-NLS-1$
          \t\t\t\t\t\t\t\tList.of(resource.unitHandle(), unitHandle)));
          \t\t\t\t\t\treturn true;
          \t\t\t\t\t}
          \t\t\t\t\tdiagnostics.add(new MultiFileCandidateDiagnostic(candidateId, unitHandle,
          \t\t\t\t\t\t\tMultiFileCandidateOutcome.FOUND, "RULE_FIELD_FOUND", //$NON-NLS-1$
          \t\t\t\t\t\t\t"A JUnit 4 Rule field using the source ExternalResource type was found.", //$NON-NLS-1$
          \t\t\t\t\t\t\tList.of(resource.unitHandle(), unitHandle)));
          \t\t\t\t\tresult.add(new RuleField(candidateId, unitHandle, declaringType.getKey(), variable.getName(),
          \t\t\t\t\t\t\tfieldType.getKey(), kind, isStatic, fragment.getInitializer().toString()));
          ''')

          replace_once(
              '''\tprivate static List<ExternalResourceRuleMigration> createMigrations(List<RuleField> fields,
          \t\t\tMap<String, ResourceType> resourcesByTypeKey, RefactoringStatus status, IProgressMonitor monitor) {
          ''',
              '''\tprivate static List<ExternalResourceRuleMigration> createMigrations(List<RuleField> fields,
          \t\t\tMap<String, ResourceType> resourcesByTypeKey, RefactoringStatus status,
          \t\t\tList<MultiFileCandidateDiagnostic> diagnostics, IProgressMonitor monitor) {
          ''')

          replace_once(
              '''\t\t\tif (previousMode != null && previousMode.booleanValue() != staticMode) {
          \t\t\t\tstatus.addFatalError("ExternalResource type " + resource.qualifiedName() //$NON-NLS-1$
          \t\t\t\t\t\t+ " is used as both @Rule and @ClassRule and cannot be converted atomically."); //$NON-NLS-1$
          \t\t\t\treturn List.of();
          \t\t\t}
          ''',
              '''\t\t\tif (previousMode != null && previousMode.booleanValue() != staticMode) {
          \t\t\t\tstatus.addFatalError("ExternalResource type " + resource.qualifiedName() //$NON-NLS-1$
          \t\t\t\t\t\t+ " is used as both @Rule and @ClassRule and cannot be converted atomically."); //$NON-NLS-1$
          \t\t\t\tdiagnostics.add(MultiFileCandidateDiagnostic.rejected(field.candidateId(), field.unitHandle(),
          \t\t\t\t\t\t"MIXED_RULE_MODES", //$NON-NLS-1$
          \t\t\t\t\t\t"The same ExternalResource type is used in instance and class Rule modes.", //$NON-NLS-1$
          \t\t\t\t\t\tList.of(resource.unitHandle(), field.unitHandle())));
          \t\t\t\treturn List.of();
          \t\t\t}
          ''')

          replace_once(
              '''\t\t\tresult.add(new ExternalResourceRuleMigration(resource.typeBindingKey(), resource.unitHandle(),
          \t\t\t\t\tresource.qualifiedName(), staticMode, resource.beforeMethodBindingKey(),
          \t\t\t\t\tresource.afterMethodBindingKey(), field.unitHandle(), field.declaringTypeKey(), field.fieldName(),
          \t\t\t\t\tfield.fieldTypeKey(), field.initializerSource()));
          ''',
              '''\t\t\tdiagnostics.add(new MultiFileCandidateDiagnostic(field.candidateId(), field.unitHandle(),
          \t\t\t\t\tMultiFileCandidateOutcome.APPLICABLE, "SEMANTICALLY_APPLICABLE", //$NON-NLS-1$
          \t\t\t\t\t"The resource type and Rule field can be migrated in one closed source plan.", //$NON-NLS-1$
          \t\t\t\t\tList.of(resource.unitHandle(), field.unitHandle())));
          \t\t\tresult.add(new ExternalResourceRuleMigration(resource.typeBindingKey(), resource.unitHandle(),
          \t\t\t\t\tresource.qualifiedName(), staticMode, resource.beforeMethodBindingKey(),
          \t\t\t\t\tresource.afterMethodBindingKey(), field.unitHandle(), field.declaringTypeKey(), field.fieldName(),
          \t\t\t\t\tfield.fieldTypeKey(), field.initializerSource()));
          \t\t\tdiagnostics.add(MultiFileCandidateDiagnostic.transformed(field.candidateId(), field.unitHandle(),
          \t\t\t\t\t"The resource callbacks and Rule registration are in the immutable Jupiter extension plan.", //$NON-NLS-1$
          \t\t\t\t\tList.of(resource.unitHandle(), field.unitHandle())));
          ''')

          path.write_text(text, encoding='utf-8')
          PY
          git diff --check
      - name: Commit patch and remove one-shot workflow
        shell: bash
        run: |
          git rm .github/workflows/apply-junit-diagnostics.yml
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add sandbox_junit_cleanup sandbox_common sandbox_common_test
          git commit -m 'Report JUnit coordinated migration decisions'
          git push origin HEAD:issue-1214-cleanup-diagnostics
