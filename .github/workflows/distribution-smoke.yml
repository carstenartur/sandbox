name: Distribution Smoke Test

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    - cron: '30 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: distribution-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  product-and-update-site:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1
        with:
          maven-version: 3.9.14
      - name: Test distribution verification utilities
        run: |
          python3 -m py_compile \
            .github/scripts/verify_distribution_artifacts.py \
            .github/scripts/verify_published_repository.py \
            .github/scripts/test_verify_published_repository.py
          python3 .github/scripts/test_verify_published_repository.py
          bash -n .github/scripts/verify_linux_distribution.sh
          bash -n .github/scripts/smoke_test_distribution.sh
      - name: Install Linux product runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb xauth libgtk-3-0 libxext6 libxrender1 libxtst6 libxi6 \
            libxrandr2 libxfixes3 libasound2t64 libnss3 libgbm1
      - name: Build and test stock product and update site from clean checkout
        run: |
          set -o pipefail
          status=0
          xvfb-run --auto-servernum mvn \
            -Pproduct,repo \
            -T 1C \
            --batch-mode \
            -Dtycho.localArtifacts=ignore \
            clean verify 2>&1 | tee /tmp/distribution-build.log || status=$?
          mkdir -p target/distribution-verification
          cp /tmp/distribution-build.log target/distribution-verification/build.log
          exit "$status"
      - name: Validate repository metadata, artifacts and Linux product layout
        run: bash .github/scripts/verify_linux_distribution.sh
      - name: Provision and start the built distribution
        run: bash .github/scripts/smoke_test_distribution.sh
      - name: Publish verification summary
        if: always() && hashFiles('target/distribution-verification/verification.md') != ''
        run: cat target/distribution-verification/verification.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload distribution evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: distribution-smoke-${{ github.sha }}
          path: target/distribution-verification/
          retention-days: 30
          if-no-files-found: error
