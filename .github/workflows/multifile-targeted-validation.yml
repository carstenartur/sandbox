name: Targeted multi-file cleanup validation

on:
  push:
    branches:
      - feature/multifile-cleanup-planning
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  targeted-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      DISPLAY: :0
      MAVEN_OPTS: -Djava.awt.headless=true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm install -g prettier stylelint stylelint-config-standard
      - run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xauth \
            libgtk-3-0 libxext6 libxrender1 libxtst6 libxi6 libxrandr2 libxfixes3 \
            libasound2t64 libnss3 libgbm1
      - uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1
        with:
          maven-version: 3.9.14
      - name: Run focused reactor
        shell: bash
        run: |
          set -o pipefail
          xvfb-run --auto-servernum mvn -e -V -T 1C --batch-mode \
            -Dtycho.localArtifacts=ignore \
            -pl sandbox_target,sandbox_common_test,sandbox_int_to_enum_test,sandbox_junit_cleanup_test \
            -am clean verify 2>&1 | tee targeted-build.log
      - name: Upload focused log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: targeted-multifile-cleanup-log
          path: targeted-build.log
          retention-days: 2
