name: PR Build Diagnostics

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ issue-1251-concrete-collectors ]

permissions:
  contents: write

concurrency:
  group: pr-build-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair-and-package:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v6
        with:
          ref: issue-1251-concrete-collectors
          fetch-depth: 1
      - name: Apply the collector fallback repair
        run: |
          python3 .github/scripts/patch_1268_safe_fallback.py
          git diff --check
          if git diff --quiet -- \
            sandbox_functional_converter/src/org/sandbox/jdt/internal/corext/fix/helper/ConcreteCollectionFactory.java \
            sandbox_functional_converter/src/org/sandbox/jdt/internal/corext/fix/helper/SafeEnhancedForHandler.java \
            sandbox_functional_converter_test/src/org/sandbox/jdt/ui/tests/quickfix/AccumulatorAndSequenceSafetyTest.java \
            sandbox_functional_converter_test/src/org/sandbox/jdt/ui/tests/quickfix/AdditionalLoopPatternsTest.java; then
            echo 'Collector fallback repair is already applied.'
          else
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add \
              sandbox_functional_converter/src/org/sandbox/jdt/internal/corext/fix/helper/ConcreteCollectionFactory.java \
              sandbox_functional_converter/src/org/sandbox/jdt/internal/corext/fix/helper/SafeEnhancedForHandler.java \
              sandbox_functional_converter_test/src/org/sandbox/jdt/ui/tests/quickfix/AccumulatorAndSequenceSafetyTest.java \
              sandbox_functional_converter_test/src/org/sandbox/jdt/ui/tests/quickfix/AdditionalLoopPatternsTest.java
            git commit -m 'Preserve supported constructor arguments with forEach fallback'
            git push origin HEAD:issue-1251-concrete-collectors
          fi
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1
        with:
          maven-version: 3.9.14
      - name: Package the focused reactor
        run: |
          mvn -B -DskipTests \
            -pl sandbox_target,sandbox-functional-converter-core,sandbox_common_core,sandbox_common,sandbox_test_commons,sandbox_functional_converter,sandbox_functional_converter_test \
            -am clean package
