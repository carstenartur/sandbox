name: PR Build Diagnostics

on:
  push:
    branches: [ issue-1251-concrete-collectors ]
  pull_request:
    branches: [ main ]
    paths:
      - 'sandbox-functional-converter-core/**'
      - 'sandbox_common_core/**'
      - 'sandbox_common/**'
      - 'sandbox_test_commons/**'
      - 'sandbox_functional_converter/**'
      - 'sandbox_functional_converter_test/**'
      - '.github/workflows/pr-build-diagnostics.yml'

permissions:
  contents: write

concurrency:
  group: pr-build-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  targeted-package:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v6
        with:
          ref: issue-1251-concrete-collectors
          fetch-depth: 0
      - name: Restore the nested-generics regression test
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('sandbox_functional_converter_test/src/org/sandbox/jdt/ui/tests/quickfix/LoopRefactoringEdgeCasesTest.java')
          text = path.read_text(encoding='utf-8')
          if 'void testNestedGenerics()' in text:
              print('Nested-generics test is already present')
              raise SystemExit(0)

          matrix = 'matrix.forEach(row -> System.out.println(row));'
          matrix_position = text.index(matrix)
          duplicate_start = text.rfind('\n\t\tString expected = """', 0, matrix_position)
          duplicate_end = text.index('\n\t\tIPackageFragment pack', matrix_position)
          if duplicate_start < 0:
              raise SystemExit('Could not locate the orphaned nested-generics expectation')
          text = text[:duplicate_start] + text[duplicate_end:]

          insertion_marker = '\n\t/**\n\t * Tests loop with wildcard generic types.'
          nested_test = '''

\t// ===========================================
\t// COMPLEX GENERIC TYPES
\t// ===========================================

\t/**
\t * Tests loop with nested generic types.
\t *
\t * <p><b>Edge Case:</b> Complex generics like {@code List<List<String>>}</p>
\t * <p><b>Expected:</b> Type inference handles nested generics correctly</p>
\t * <p><b>Why Important:</b> Generic type erasure can cause compilation issues</p>
\t *
\t * <p><b>Note:</b> Currently disabled - pattern not converting in V1. Needs investigation.</p>
\t */
//\t@Disabled("Pattern not converting in V1 - needs investigation")
\t@Test
\t@DisplayName("Nested generics: List<List<T>> type inference")
\tvoid testNestedGenerics() throws CoreException {
\t\tString input = """
\t\t\t\tpackage test1;
\t\t\t\timport java.util.*;
\t\t\t\tclass MyTest {
\t\t\t\t\tpublic static void main(String[] args) {
\t\t\t\t\t\tnew MyTest().process(new ArrayList<>());
\t\t\t\t\t}
\t\t\t\t\tpublic void process(List<List<String>> matrix) {
\t\t\t\t\t\tfor (List<String> row : matrix) {
\t\t\t\t\t\t\tSystem.out.println(row);
\t\t\t\t\t\t}
\t\t\t\t\t}
\t\t\t\t}
\t\t\t\t""";

\t\tString expected = """
\t\t\t\tpackage test1;
\t\t\t\timport java.util.*;
\t\t\t\tclass MyTest {
\t\t\t\t\tpublic static void main(String[] args) {
\t\t\t\t\t\tnew MyTest().process(new ArrayList<>());
\t\t\t\t\t}
\t\t\t\t\tpublic void process(List<List<String>> matrix) {
\t\t\t\t\t\tmatrix.forEach(row -> System.out.println(row));
\t\t\t\t\t}
\t\t\t\t}
\t\t\t\t""";

\t\tIPackageFragment pack = context.getSourceFolder().createPackageFragment("test1", false, null);
\t\tICompilationUnit cu = pack.createCompilationUnit("MyTest.java", input, false, null);
\t\tcontext.enable(MYCleanUpConstants.USEFUNCTIONALLOOP_CLEANUP);
\t\tcontext.assertRefactoringResultAsExpected(new ICompilationUnit[] { cu }, new String[] { expected }, null);
\t}
'''
          if insertion_marker not in text:
              raise SystemExit('Could not locate the wildcard-generics insertion point')
          text = text.replace(insertion_marker, nested_test + insertion_marker, 1)
          path.write_text(text, encoding='utf-8')
          PY
          if ! git diff --quiet -- sandbox_functional_converter_test/src/org/sandbox/jdt/ui/tests/quickfix/LoopRefactoringEdgeCasesTest.java; then
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add sandbox_functional_converter_test/src/org/sandbox/jdt/ui/tests/quickfix/LoopRefactoringEdgeCasesTest.java
            git commit -m 'Restore nested generic loop regression test'
            git push origin HEAD:issue-1251-concrete-collectors
          fi
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1
        with:
          maven-version: 3.9.14
      - name: Compile functional converter modules
        run: |
          set -o pipefail
          mvn -B -DskipTests \
            -pl sandbox_target,sandbox-functional-converter-core,sandbox_common_core,sandbox_common,sandbox_test_commons,sandbox_functional_converter,sandbox_functional_converter_test \
            -am clean package 2>&1 | tee targeted-build.log
      - name: Upload targeted build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: targeted-build-${{ github.sha }}
          path: targeted-build.log
          retention-days: 3
          if-no-files-found: error
