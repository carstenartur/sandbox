                                </a>
                            </p>
                            <a href="dev/bench/">View Performance Charts →</a>
                        </div>
                        
                        <div class="card">
                            <h3>🔍 Refactoring Mining</h3>
                            <p>Gemini AI commit analysis with DSL rule proposals</p>
                            <p style="margin: 10px 0;">
                                <a href="https://github.com/carstenartur/sandbox/actions/workflows/gemini-mining.yml">
                                    <img src="https://github.com/carstenartur/sandbox/actions/workflows/gemini-mining.yml/badge.svg" alt="Gemini Mining Status" style="height: 20px;">
                                </a>
