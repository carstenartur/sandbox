                }
                
                .badges {
                    display: flex;
                    flex-wrap: wrap;
                    justify-content: center;
                    gap: 0.5rem;
                    margin-top: 1.5rem;
                }
                
                .badges img {
                    height: 20px;
                }
                
                .container {
                    max-width: 1200px;
                    margin: 0 auto;
                    padding: 2rem;
                }
                
                .section {
                    margin-bottom: 3rem;
                }
                
                .section h2 {
                    color: var(--primary-dark);
                    font-size: 1.8rem;
                    margin-bottom: 1.5rem;
                    border-bottom: 3px solid var(--primary);
                    padding-bottom: 0.5rem;
                }
                
                .card-grid {
                    display: grid;
                    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                    gap: 1.5rem;
                }
                
                .card {
