                    padding: 0.25rem 0.75rem;
                    border-radius: 12px;
                    font-size: 0.85rem;
                    font-weight: 500;
                    margin-top: 0.5rem;
                }
                
                .label-stable {
                    background: var(--secondary);
                    color: white;
                }
                
                .label-dev {
                    background: var(--warning);
                    color: white;
                }
                
                .install-steps {
                    background: white;
                    border-radius: 8px;
                    padding: 2rem;
                    box-shadow: var(--card-shadow);
                }
                
                .install-steps ol {
                    margin-left: 1.5rem;
                }
                
                .install-steps li {
