                    --primary: #3498db;
                    --primary-dark: #2c3e50;
                    --secondary: #2ecc71;
                    --warning: #f39c12;
                    --danger: #e74c3c;
                    --light-bg: #f8f9fa;
                    --card-shadow: 0 2px 8px rgba(0,0,0,0.1);
                    --card-hover-shadow: 0 4px 16px rgba(0,0,0,0.15);
                }
                
                * {
