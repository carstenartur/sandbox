name: Deploy Snapshot to GitHub Pages

on:
  workflow_run:
    workflows: [ 'Java CI with Maven' ]
    types: [ completed ]
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: sandbox-gh-pages-publication
  cancel-in-progress: false

jobs:
  build-and-deploy:
    if: >-
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      VALIDATED_SHA: ${{ github.event.workflow_run.head_sha }}
      VALIDATED_REF: refs/heads/main
      SOURCE_JAVA_CI_RUN_ID: ${{ github.event.workflow_run.id }}
      SOURCE_JAVA_CI_RUN_URL: ${{ github.event.workflow_run.html_url }}

    steps:
      - name: Checkout the validated commit
        uses: actions/checkout@v6
        with:
          ref: ${{ env.VALIDATED_SHA }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin

      - name: Cache Maven dependencies
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml', 'sandbox_target/*.target') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Set up Maven
        uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1
        with:
          maven-version: 3.9.14

      - name: Install Linux product runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb xauth libgtk-3-0 libxext6 libxrender1 libxtst6 libxi6 \
            libxrandr2 libxfixes3 libasound2t64 libnss3 libgbm1

      - name: Build and test product and update site
        run: |
          set -o pipefail
          status=0
          xvfb-run --auto-servernum mvn \
            -Pproduct,repo \
            -T 1C \
            --batch-mode \
            -Dtycho.localArtifacts=ignore \
            clean verify 2>&1 | tee /tmp/snapshot-build.log || status=$?
          mkdir -p target/distribution-verification
          cp /tmp/snapshot-build.log target/distribution-verification/snapshot-build.log
          exit "$status"

      - name: Validate repository metadata, artifacts and Linux product layout
        run: bash .github/scripts/verify_linux_distribution.sh

      - name: Provision and start the built distribution
        run: bash .github/scripts/smoke_test_distribution.sh

      - name: Generate snapshot build manifest
        run: |
          python3 .github/scripts/generate_test_report.py > /tmp/test-report-generation.log
          python3 .github/scripts/generate_build_manifest.py \
            --commit-sha "$VALIDATED_SHA" \
            --source-ref "$VALIDATED_REF" \
            --output build-manifest.json
          python3 -m json.tool build-manifest.json > /dev/null

      - name: Prepare snapshot and dashboard
        run: |
          snapshot_dir="gh-pages-content/snapshots/latest"
          mkdir -p "$snapshot_dir"
          cp -a sandbox_updatesite/target/repository/. "$snapshot_dir/"
          cp build-manifest.json "$snapshot_dir/build-manifest.json"
          cp target/distribution-verification/verification.json "$snapshot_dir/distribution-verification.json"
          cp target/distribution-verification/verification.md "$snapshot_dir/distribution-verification.md"
          cp .github/pages/index.html gh-pages-content/index.html

          mkdir -p gh-pages-content/snapshots
          timestamp="$(date +%s)000"
          cat > gh-pages-content/snapshots/compositeContent.xml << EOF
          <?xml version='1.0' encoding='UTF-8'?>
          <?compositeMetadataRepository version='1.0.0'?>
          <repository name='Sandbox Snapshots'
                      type='org.eclipse.equinox.internal.p2.metadata.repository.CompositeMetadataRepository'
                      version='1.0.0'>
            <properties size='1'>
              <property name='p2.timestamp' value='$timestamp'/>
            </properties>
            <children size='1'>
              <child location='latest'/>
            </children>
          </repository>
          EOF
          cat > gh-pages-content/snapshots/compositeArtifacts.xml << EOF
          <?xml version='1.0' encoding='UTF-8'?>
          <?compositeArtifactRepository version='1.0.0'?>
          <repository name='Sandbox Snapshots'
                      type='org.eclipse.equinox.internal.p2.artifact.repository.CompositeArtifactRepository'
                      version='1.0.0'>
            <properties size='1'>
              <property name='p2.timestamp' value='$timestamp'/>
            </properties>
            <children size='1'>
              <child location='latest'/>
            </children>
          </repository>
          EOF

      - name: Checkout current gh-pages revision
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-before
          fetch-depth: 1

      - name: Capture current gh-pages revision
        id: gh_pages_before
        run: echo "sha=$(git -C gh-pages-before rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy snapshot and dashboard
        id: deploy_snapshot
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-content
          publish_branch: gh-pages
          keep_files: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: Deploy verified snapshot for ${{ env.VALIDATED_SHA }}

      - name: Capture deployed gh-pages revision
        id: gh_pages_after
        run: |
          git -C gh-pages-before fetch origin gh-pages
          echo "sha=$(git -C gh-pages-before rev-parse origin/gh-pages)" >> "$GITHUB_OUTPUT"

      - name: Verify advertised snapshot URLs
        id: verify_snapshot_urls
        run: |
          python3 .github/scripts/verify_published_repository.py \
            --repository-url https://carstenartur.github.io/sandbox/snapshots/latest/ \
            --expected-json target/distribution-verification/verification.json \
            --output target/distribution-verification/snapshot-url-verification.json
          python3 .github/scripts/verify_published_repository.py \
            --repository-url https://carstenartur.github.io/sandbox/snapshots/ \
            --expected-child latest \
            --output target/distribution-verification/snapshot-composite-verification.json

      - name: Roll back a failed snapshot-site verification
        if: ${{ failure() && steps.deploy_snapshot.outcome == 'success' && steps.verify_snapshot_urls.outcome == 'failure' }}
        run: |
          set -euo pipefail
          previous="${{ steps.gh_pages_before.outputs.sha }}"
          deployed="${{ steps.gh_pages_after.outputs.sha }}"
          if [[ -z "$previous" || -z "$deployed" ]]; then
            echo "::error::The previous or deployed gh-pages revision was not captured."
            exit 1
          fi
          git -C gh-pages-before push \
            --force-with-lease=refs/heads/gh-pages:${deployed} \
            origin "${previous}:refs/heads/gh-pages"
          echo "Rolled gh-pages back from ${deployed} to ${previous}." \
            | tee target/distribution-verification/snapshot-publication-rollback.log

      - name: Upload immutable snapshot provenance
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: snapshot-provenance-${{ env.VALIDATED_SHA }}
          path: |
            build-manifest.json
            target/distribution-verification/
          retention-days: 90
          if-no-files-found: error

      - name: Report deployed resources
        if: always()
        run: |
          {
            echo '### Deployed resources'
            echo
            echo "- [Validated commit](https://github.com/${GITHUB_REPOSITORY}/commit/${VALIDATED_SHA})"
            echo "- [Source Java CI run](${SOURCE_JAVA_CI_RUN_URL})"
            echo '- [Project dashboard](https://carstenartur.github.io/sandbox/)'
            echo '- [Latest snapshot update site](https://carstenartur.github.io/sandbox/snapshots/latest/)'
            echo '- [Snapshot build manifest](https://carstenartur.github.io/sandbox/snapshots/latest/build-manifest.json)'
            echo '- [Distribution verification](https://carstenartur.github.io/sandbox/snapshots/latest/distribution-verification.md)'
          } >> "$GITHUB_STEP_SUMMARY"
