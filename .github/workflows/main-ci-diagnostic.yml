name: Main CI diagnostic

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-with-log:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      DISPLAY: :0
      MAVEN_OPTS: -Djava.awt.headless=true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install CSS and display dependencies
        run: |
          npm install -g prettier stylelint stylelint-config-standard
          sudo apt-get update
          sudo apt-get install -y xvfb xauth \
            libgtk-3-0 libxext6 libxrender1 libxtst6 libxi6 libxrandr2 libxfixes3 \
            libasound2t64 libnss3 libgbm1
      - name: Cache Maven dependencies
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml', 'sandbox_target/*.target') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Set up Maven
        uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1 # v5
        with:
          maven-version: 3.9.14
      - name: Build affected test bundles with complete Maven log
        shell: bash
        run: |
          set -o pipefail
          xvfb-run --auto-servernum mvn -U -e -V -T 1C --batch-mode \
            -pl sandbox_target,sandbox_junit_cleanup_test,sandbox_int_to_enum_test -am \
            -Dtycho.localArtifacts=ignore clean verify 2>&1 | tee maven-build.log
      - name: Upload Maven log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: multi-file-ci-maven-log-${{ github.run_number }}
          path: maven-build.log
          if-no-files-found: error
          retention-days: 7
