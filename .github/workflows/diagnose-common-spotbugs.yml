name: Diagnose build after common SpotBugs

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'sandbox_common/**'
      - 'sandbox_extra_search/**'
      - 'sandbox_triggerpattern/**'
      - '.github/workflows/diagnose-common-spotbugs.yml'

permissions:
  contents: read

jobs:
  common:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1
        with:
          maven-version: 3.9.14
      - name: Verify common bundle and SpotBugs
        shell: bash
        run: |
          set +e
          mvn --batch-mode -ntp -U \
            -pl sandbox_target,sandbox_common -am \
            -DskipTests -Djacoco.skip=true \
            clean verify > common-spotbugs.log 2>&1
          status=$?
          tail -n 250 common-spotbugs.log
          exit "$status"
      - name: Upload focused log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: common-spotbugs-log
          path: common-spotbugs.log
          retention-days: 2
          if-no-files-found: error

  full-build:
    runs-on: ubuntu-latest
    env:
      DISPLAY: :0
      MAVEN_OPTS: -Djava.awt.headless=true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install build dependencies
        run: |
          npm install -g prettier stylelint stylelint-config-standard
          sudo apt-get update
          sudo apt-get install -y xvfb xauth \
            libgtk-3-0 libxext6 libxrender1 libxtst6 libxi6 libxrandr2 libxfixes3 \
            libasound2t64 libnss3 libgbm1
      - uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1
        with:
          maven-version: 3.9.14
      - name: Run full repository build and capture log
        shell: bash
        run: |
          set +e
          xvfb-run --auto-servernum mvn -e -V -T 1C --batch-mode \
            -Dtycho.localArtifacts=ignore clean verify > full-build.log 2>&1
          status=$?
          tail -n 300 full-build.log
          exit "$status"
      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: full-build-log
          path: full-build.log
          retention-days: 2
          if-no-files-found: error
