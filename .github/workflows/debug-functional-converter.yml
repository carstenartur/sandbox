name: Functional Converter Diagnostic

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - fix/functional-disabled-tests

concurrency:
  group: functional-converter-diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
      - name: Set up Maven
        uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1
        with:
          maven-version: 3.9.14
      - name: Install target definition
        run: >-
          mvn -e -V --batch-mode -DskipTests
          -pl sandbox_target -am install
      - name: Compile Functional Converter reactor
        id: compile
        shell: bash
        run: |
          set +e
          mvn -e -V --batch-mode \
            -Dtycho.localArtifacts=ignore \
            -DskipTests \
            -pl sandbox_functional_converter -am \
            clean verify 2>&1 | tee functional-converter-build.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: functional-converter-build-log
          path: functional-converter-build.log
          if-no-files-found: error
