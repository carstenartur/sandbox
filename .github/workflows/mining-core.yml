name: Nightly Commit Mining

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of commits to inspect in this run'
        default: '200'
      llm_provider:
        description: 'LLM provider; leave empty for auto-detection'
        default: ''

concurrency:
  group: mining-state
  cancel-in-progress: false

jobs:
  mine:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build mining core
        run: |
          set -euo pipefail
          mvn install -N -q
          mvn install -pl sandbox_common_core -DskipTests -q
          mvn package -pl sandbox_mining_core -DskipTests -q

      - name: Restore staged candidate history
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin mining/candidates >/dev/null 2>&1; then
            git fetch origin mining/candidates:refs/remotes/origin/mining/candidates
            if git ls-tree -d --name-only origin/mining/candidates mining-candidates | grep -q '^mining-candidates$'; then
              git archive origin/mining/candidates mining-candidates | tar -xf -
              echo "Restored $(find mining-candidates -name '*-candidate.json' | wc -l) staged candidates."
            fi
          else
            echo 'No candidate-data branch exists yet.'
          fi

      - name: Discover staged candidates
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          GEMINI_DEBUG: 'true'
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          QWEN_MODEL: ${{ secrets.QWEN_MODEL }}
          LLAMA_API_KEY: ${{ secrets.LLAMA_API_KEY }}
          LLAMA_MODEL: ${{ secrets.LLAMA_MODEL }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MISTRAL_MODEL: ${{ secrets.MISTRAL_MODEL }}
        run: |
          set -euo pipefail
          PROVIDER_ARG=()
          if [ -n "${{ github.event.inputs.llm_provider }}" ]; then
            PROVIDER_ARG=(--llm-provider "${{ github.event.inputs.llm_provider }}")
          fi
          java -jar sandbox_mining_core/target/sandbox-mining-core.jar \
            --config .github/refactoring-mining/repos.yml \
            --state .github/refactoring-mining/state.json \
            --sandbox-root . \
            --batch-size "${{ github.event.inputs.batch_size || '200' }}" \
            --commits-per-request 4 \
            --output docs/mining-report/ \
            "${PROVIDER_ARG[@]}"

      - name: Verify candidate behavior
        run: |
          set -euo pipefail
          java -cp sandbox_mining_core/target/sandbox-mining-core.jar \
            org.sandbox.mining.core.candidate.CandidateVerificationCli \
            --candidate-dir mining-candidates \
            --report-dir docs/mining-report \
            --curated-hint-dir sandbox_common_core/src/main/resources/org/sandbox/jdt/triggerpattern/internal \
            --source-version 21

      - name: Persist candidate data outside main
        run: |
          set -euo pipefail
          DATA_WORKTREE="$RUNNER_TEMP/mining-candidate-data"
          rm -rf "$DATA_WORKTREE"

          if git show-ref --verify --quiet refs/remotes/origin/mining/candidates; then
            git worktree add -B mining/candidates "$DATA_WORKTREE" origin/mining/candidates
          else
            git worktree add --detach "$DATA_WORKTREE" HEAD
            git -C "$DATA_WORKTREE" checkout --orphan mining/candidates
            git -C "$DATA_WORKTREE" rm -rf .
            git -C "$DATA_WORKTREE" clean -fdx
          fi

          rm -rf "$DATA_WORKTREE/mining-candidates"
          mkdir -p "$DATA_WORKTREE/mining-candidates"
          if [ -d mining-candidates ]; then
            cp -a mining-candidates/. "$DATA_WORKTREE/mining-candidates/"
          fi
          cat > "$DATA_WORKTREE/README.md" <<'EOF'
          # Mining candidate data

          This branch stores untrusted, staged DSL candidate JSON and review decisions.
          It is deliberately not merged into `main` and contains no productive hint files.
          EOF

          git -C "$DATA_WORKTREE" config user.name 'github-actions[bot]'
          git -C "$DATA_WORKTREE" config user.email 'github-actions[bot]@users.noreply.github.com'
          git -C "$DATA_WORKTREE" add -A
          if ! git -C "$DATA_WORKTREE" diff --cached --quiet; then
            git -C "$DATA_WORKTREE" commit -m "mining: persist candidate state ${{ github.run_number }}"
            git -C "$DATA_WORKTREE" push origin mining/candidates
          else
            echo 'No candidate-state changes to persist.'
          fi
          git worktree remove "$DATA_WORKTREE" --force

      - name: Create review issues for verified candidates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          import os
          import pathlib
          import re
          import subprocess
          import tempfile

          def inline(value):
              return ' '.join(str(value or '').split()).replace('|', '\\|')

          def fenced(value, language):
              text = str(value or '')
              longest = max((len(run) for run in re.findall(r'`+', text)), default=0)
              marker = '`' * max(4, longest + 1)
              return f'{marker}{language}\n{text}\n{marker}'

          candidate_dir = pathlib.Path('mining-candidates')
          if not candidate_dir.exists():
              print('No candidate directory; nothing to review.')
              raise SystemExit(0)

          ready = []
          for path in sorted(candidate_dir.glob('*-candidate.json')):
              try:
                  candidate = json.loads(path.read_text(encoding='utf-8'))
              except Exception as exc:
                  print(f'Ignoring unreadable candidate {path}: {exc}')
                  continue
              if candidate.get('status') == 'READY_FOR_REVIEW':
                  ready.append((path, candidate))

          created_count = 0
          for path, candidate in ready:
              if created_count >= 5:
                  break
              candidate_id = candidate.get('candidateId') or path.name.removesuffix('-candidate.json')
              search = f'{candidate_id} in:body'
              existing = subprocess.run(
                  ['gh', 'issue', 'list', '--state', 'all', '--search', search,
                   '--json', 'number', '--jq', '.[0].number'],
                  check=False, capture_output=True, text=True).stdout.strip()
              if existing:
                  print(f'Candidate {candidate_id} already has issue #{existing}')
                  continue

              source = str(candidate.get('sourceRepo') or '').removesuffix('.git')
              commit = str(candidate.get('sourceCommit') or '')
              verification = candidate.get('verification') or {}
              summary = inline(candidate.get('summary') or 'Mined cleanup candidate')
              title = f'🧪 Review DSL candidate: {summary}'[:220]
              dsl_block = fenced(candidate.get('dslRule'), 'text')
              before_block = fenced(candidate.get('beforeExample'), 'java')
              after_block = fenced(candidate.get('afterExample'), 'java')
              negative_block = fenced(candidate.get('negativeExample'), 'java')
              body = f'''<!-- mining-candidate-id: {candidate_id} -->
          ## Verified mining candidate

          | Field | Value |
          |---|---|
          | Candidate ID | `{candidate_id}` |
          | Revision | `{candidate.get("revision", 1)}` |
          | Status | `{inline(candidate.get("status"))}` |
          | Rule fingerprint | `{inline(candidate.get("ruleFingerprint"))}` |
          | Behavior fingerprint | `{inline(candidate.get("behaviorFingerprint"))}` |
          | Source | {source}/commit/{commit} |
          | Target hint file | `{inline(candidate.get("targetHintFile"))}` |
          | Verifier | `{inline(verification.get("verifierVersion"))}` |

          ### Verification

          `{inline(verification.get("stage") or "unknown")}` — {inline(verification.get("message") or "No diagnostic")}

          ### Proposed DSL

          {dsl_block}

          ### Before

          {before_block}

          ### After

          {after_block}

          ### Negative example

          {negative_block}

          ## Review checklist

          - [ ] The transformation is local and semantically safe.
          - [ ] The negative example covers the most important near miss.
          - [ ] The rule does not duplicate a curated rule.
          - [ ] The target hint file and source-version constraints are correct.
          - [ ] Promotion will include a permanent behavior test.

          After review, run the **Review mining candidate** workflow with this candidate ID and issue number. No productive hint file was modified by discovery.
          '''
              with tempfile.NamedTemporaryFile('w', encoding='utf-8', delete=False) as handle:
                  handle.write(body)
                  body_path = handle.name
              try:
                  created = subprocess.run(
                      ['gh', 'issue', 'create', '--title', title, '--body-file', body_path],
                      check=True, capture_output=True, text=True).stdout.strip()
                  print(f'Created review issue: {created}')
                  created_count += 1
              finally:
                  os.unlink(body_path)
          PY

      - name: Add mining diagnostics to job summary
        if: always()
        run: |
          echo '### Mining diagnostics' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          if [ -f docs/mining-report/statistics.json ]; then
            python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          data = json.load(open('docs/mining-report/statistics.json', encoding='utf-8'))
          metadata = data.get('runMetadata', {})
          print(f'- API calls: {metadata.get("apiCallsMade", 0)}')
          print(f'- Commits processed: {data.get("totalProcessed", 0)}')
          print(f'- Deferred commits: {metadata.get("deferredCommits", 0)}')
          PY
          else
            echo '- statistics.json was not produced' >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f docs/mining-report/candidates.json ]; then
            python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          candidates = json.load(open('docs/mining-report/candidates.json', encoding='utf-8'))
          ready = sum(c.get('status') == 'READY_FOR_REVIEW' for c in candidates)
          failed = sum((c.get('verification') or {}).get('successful') is False for c in candidates)
          print(f'- Candidates ready for review: {ready}')
          print(f'- Candidates failing deterministic verification: {failed}')
          PY
          fi

      - name: Exclude legacy proposal registry from published report
        run: |
          rm -f docs/mining-report/known-rules.json
          cat > docs/mining-report/known-rules-notice.txt <<'EOF'
          known-rules.json is legacy mining state and is not an approval registry.
          Candidate review state is published in candidates.json and candidates.html.
          EOF

      - name: Deploy mining report
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/mining-report
          publish_branch: gh-pages
          destination_dir: mining-report
          keep_files: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: 'mining: publish verified candidate report ${{ github.run_number }}'

      - name: Upload candidate artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mining-candidates-${{ github.run_number }}
          path: |
            docs/mining-report/
            mining-candidates/
          if-no-files-found: ignore

      - name: Report candidate review URL
        run: |
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '📋 [View verified candidates](https://carstenartur.github.io/sandbox/mining-report/candidates.html)' >> "$GITHUB_STEP_SUMMARY"

      - name: Persist resumable scan state only
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          STATE='.github/refactoring-mining/state.json'
          if [ ! -f "$STATE" ]; then
            echo 'No mining state file was produced.' >&2
            exit 1
          fi
          cp "$STATE" "$RUNNER_TEMP/mining-state.json"

          git fetch origin main
          git reset --hard HEAD
          git clean -fd
          git checkout -B mining/state-update origin/main
          cp "$RUNNER_TEMP/mining-state.json" "$STATE"

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add "$STATE"
          if git diff --cached --quiet; then
            echo 'No scan-state changes to persist.'
            exit 0
          fi

          git commit -m "mining: update resumable scan state ${{ github.run_number }}"
          git push origin mining/state-update --force

          PR_NUMBER=$(gh pr list --head mining/state-update --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -z "$PR_NUMBER" ]; then
            gh pr create \
              --base main \
              --head mining/state-update \
              --title "mining: Update resumable scan state (${{ github.run_number }})" \
              --body 'Automated update containing only resumable commit-scan state. Candidate JSON, known-rule proposals, and productive hint files are deliberately excluded.'
            PR_NUMBER=$(gh pr list --head mining/state-update --state open --json number --jq '.[0].number')
          fi
          gh pr merge "$PR_NUMBER" --squash --auto --delete-branch \
            || gh pr merge "$PR_NUMBER" --squash --delete-branch
