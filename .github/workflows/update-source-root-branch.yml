name: Update source root policy branch

on:
  push:
    branches: [ issue-1224-source-root-policy ]
    paths:
      - '.github/workflows/update-source-root-branch.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: issue-1224-source-root-policy
          fetch-depth: 0
      - name: Merge current main
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main
          git rm .github/workflows/update-source-root-branch.yml
          git commit -m 'Remove branch update workflow'
          git push origin HEAD:issue-1224-source-root-policy
