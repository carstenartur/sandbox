name: Export patched release workflow

on:
  push:
    branches: [ issue-1215-distribution-smoke ]
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: export-patched-release-workflow
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: issue-1215-distribution-smoke
          fetch-depth: 1
      - name: Download the validated patched workflow
        run: |
          gh run download 30099487911 \
            --repo "$GITHUB_REPOSITORY" \
            --name distribution-evidence-patch-07ef028129a57bdd66173de1d6143773889ce7e1 \
            --dir /tmp/distribution-patch
          test -f /tmp/distribution-patch/.github/workflows/deploy-release.yml
      - name: Publish the workflow blob at a non-workflow path
        run: |
          mkdir -p .github/patches
          cp /tmp/distribution-patch/.github/workflows/deploy-release.yml \
            .github/patches/deploy-release-patched.yml
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .github/patches/deploy-release-patched.yml
          git diff --cached --quiet && exit 0
          git commit -m 'Stage patched release workflow blob'
          git push origin HEAD:issue-1215-distribution-smoke
