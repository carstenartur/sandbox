name: Diagnose Hibernate Upgrade

on:
  push:
    branches:
      - deps/hibernate-7.4-search-8.4

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
      - uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1
        with:
          maven-version: 3.9.14
      - name: Build storage module with full diagnostics
        id: build
        shell: bash
        run: |
          set +e
          mvn -e -V --batch-mode -Dtycho.localArtifacts=ignore -pl sandbox-jgit-storage-hibernate -am clean verify > hibernate-upgrade.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 500 hibernate-upgrade.log
          exit 0
      - uses: actions/upload-artifact@v7
        with:
          name: hibernate-upgrade-log
          path: hibernate-upgrade.log
          retention-days: 3
      - name: Fail when module build failed
        if: steps.build.outputs.status != '0'
        run: exit 1
