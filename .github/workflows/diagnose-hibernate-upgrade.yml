name: Diagnose Hibernate upgrade

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1
        with:
          maven-version: 3.9.14
      - name: Compile storage module and print concise failure context
        shell: bash
        run: |
          set +e
          mvn --batch-mode -ntp \
            -pl sandbox-jgit-storage-hibernate \
            -DskipTests -Dspotbugs.skip=true -Djacoco.skip=true \
            compile > hibernate-upgrade.log 2>&1
          status=$?
          echo '=== relevant diagnostics ==='
          grep -E '(^|\]) (ERROR|WARNING)|COMPILATION|Could not resolve|Failed to execute|cannot find symbol|incompatible types|NoSuchMethod|Exception' hibernate-upgrade.log | tail -n 50 || true
          echo '=== final Maven output ==='
          tail -n 80 hibernate-upgrade.log
          exit "$status"
