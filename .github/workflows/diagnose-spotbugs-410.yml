name: Diagnose SpotBugs 4.10.3

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
      - uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1
        with:
          maven-version: 3.9.14
      - name: Build through sandbox_common_core
        id: build
        shell: bash
        run: |
          set +e
          mvn -e -V --batch-mode -pl sandbox_common_core -am clean verify > spotbugs-410.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 700 spotbugs-410.log
          exit 0
      - uses: actions/upload-artifact@v7
        with:
          name: spotbugs-410-common-core-log
          path: spotbugs-410.log
          retention-days: 3
      - name: Fail on build failure
        if: steps.build.outputs.status != '0'
        run: exit 1
