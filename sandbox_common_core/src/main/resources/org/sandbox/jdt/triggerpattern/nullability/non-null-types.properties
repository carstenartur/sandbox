# Non-null type whitelist for NullabilityGuard
# Format: fully.qualified.ClassName=REASON
#
# Types listed here are considered to never return null from toString()
# or to always be non-null when they exist as instances.

# String and string builders
java.lang.String=toString_never_null
java.lang.StringBuilder=toString_never_null
java.lang.StringBuffer=toString_never_null
java.io.StringWriter=toString_never_null
java.io.ByteArrayOutputStream=toString_never_null

# Primitive wrappers (autoboxing guarantees non-null instance)
java.lang.Boolean=instance_never_null
java.lang.Byte=instance_never_null
java.lang.Character=instance_never_null
java.lang.Short=instance_never_null
java.lang.Integer=instance_never_null
java.lang.Long=instance_never_null
java.lang.Float=instance_never_null
java.lang.Double=instance_never_null

# java.time (factory methods return non-null)
java.time.LocalDate=factory_never_null
java.time.LocalTime=factory_never_null
java.time.LocalDateTime=factory_never_null
java.time.Instant=factory_never_null
java.time.ZonedDateTime=factory_never_null
java.time.OffsetDateTime=factory_never_null
java.time.Duration=factory_never_null
java.time.Period=factory_never_null

# java.nio.file
java.nio.file.Path=instance_never_null

# Eclipse JDT AST types (parsed nodes are always valid)
org.eclipse.jdt.core.dom.ASTNode=parsed_node_valid
org.eclipse.jdt.core.dom.Type=structural_child
org.eclipse.jdt.core.dom.Expression=structural_child
org.eclipse.jdt.core.dom.Statement=structural_child
org.eclipse.jdt.core.dom.Name=structural_child
org.eclipse.jdt.core.dom.SimpleName=structural_child
org.eclipse.jdt.core.dom.QualifiedName=structural_child
org.eclipse.jdt.core.dom.MethodDeclaration=structural_child
org.eclipse.jdt.core.dom.TypeDeclaration=structural_child
org.eclipse.jdt.core.dom.CompilationUnit=parsed_node_valid
org.eclipse.jdt.core.dom.InfixExpression.Operator=enum_like
org.eclipse.jdt.core.dom.PrefixExpression.Operator=enum_like
org.eclipse.jdt.core.dom.PostfixExpression.Operator=enum_like
org.eclipse.jdt.core.dom.Assignment.Operator=enum_like
org.eclipse.jdt.core.dom.Modifier=structural_child

# java.util collections (the collection instances themselves are non-null)
java.util.ArrayList=instance_never_null
java.util.LinkedList=instance_never_null
java.util.HashMap=instance_never_null
java.util.LinkedHashMap=instance_never_null
java.util.TreeMap=instance_never_null
java.util.HashSet=instance_never_null
java.util.TreeSet=instance_never_null

# java.util.regex
java.util.regex.Pattern=instance_never_null
java.util.regex.Matcher=instance_never_null

# java.math
java.math.BigDecimal=instance_never_null
java.math.BigInteger=instance_never_null
