# feature.properties for sandbox_jgit_db_feature

description=Git Database Index Feature\n\
\n\
Provides a DB-backed Java analysis plugin that runs alongside EGit.\n\
Mirrors Git repositories into an embedded database and enables\n\
Java-specific database queries that are impossible with the filesystem alone.\n\
\n\
Features:\n\
- Automatic indexing of Git commits and Java blob metadata\n\
- Full-text search over commit messages and Java source code\n\
- Java type change history across all commits\n\
- Author statistics and commit analytics\n\
- Incremental indexing on EGit operations (commit, pull, push)\n\
- Configurable preferences for auto-indexing and database location\n\

