# feature_de.properties für sandbox_jgit_db_feature

description=Git-Datenbank-Index-Feature\n\
\n\
Bietet ein datenbankgestütztes Java-Analyse-Plugin, das parallel zu EGit läuft.\n\
Spiegelt Git-Repositories in eine eingebettete Datenbank und ermöglicht\n\
Java-spezifische Datenbankabfragen, die mit dem Dateisystem allein unmöglich sind.\n\
\n\
Funktionen:\n\
- Automatische Indexierung von Git-Commits und Java-Blob-Metadaten\n\
- Volltextsuche über Commit-Nachrichten und Java-Quellcode\n\
- Java-Typ-Änderungshistorie über alle Commits\n\
- Autorenstatistiken und Commit-Analysen\n\
- Inkrementelle Indexierung bei EGit-Operationen (Commit, Pull, Push)\n\
- Konfigurierbare Einstellungen für Auto-Indexierung und Datenbank-Speicherort\n\

